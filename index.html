<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a2e1a">
<title>AgriSpray Pro | Complete Farm Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #0a5c2e; --primary-light: #1a7a3e; --primary-dark: #064520;
  --secondary: #ffb74d; --secondary-dark: #ff9800; --accent: #00bcd4;
  --danger: #ef5350; --success: #4caf50; --warning: #ff9800;
  --dark: #0a0e0a; --darker: #0a1a0a;
  --text-primary: #fff; --text-secondary: rgba(255,255,255,0.7); --text-muted: rgba(255,255,255,0.4);
}
body { font-family: 'Inter', sans-serif; background: radial-gradient(ellipse at 20% 30%, #0a1a0a, #020402); color: var(--text-primary); min-height: 100vh; }

.login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 30% 40%, #0a2e0a, #020402); display: flex; align-items: center; justify-content: center; z-index: 10000; }
.login-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 32px; padding: 48px; width: 450px; max-width: 90%; text-align: center; }
.login-card .logo-icon { font-size: 64px; margin-bottom: 16px; }
.login-card h1 { font-size: 32px; background: linear-gradient(135deg, #fff, var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.login-card input { width: 100%; padding: 14px 18px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 60px; color: white; }
.login-card button { width: 100%; padding: 14px; margin-top: 20px; background: linear-gradient(135deg, var(--primary-light), var(--primary-dark)); border: none; border-radius: 60px; color: white; font-weight: 600; cursor: pointer; }
.password-eye { position: relative; }
.password-eye input { padding-right: 45px; }
.password-eye i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; }

#mainApp { display: none; }
.sidebar { position: fixed; top: 0; left: 0; width: 260px; height: 100vh; background: rgba(10,14,10,0.95); backdrop-filter: blur(12px); border-right: 1px solid rgba(255,255,255,0.08); z-index: 100; overflow-y: auto; }
.sidebar .logo { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); text-align: center; }
.sidebar .logo .icon { font-size: 48px; margin-bottom: 10px; }
.sidebar .logo h2 { font-size: 18px; background: linear-gradient(135deg, #fff, var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.sidebar nav { padding: 16px 0; }
.sidebar .nav-section { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; padding: 12px 20px 6px; }
.sidebar .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 20px; cursor: pointer; color: var(--text-secondary); transition: all 0.2s; border-left: 3px solid transparent; }
.sidebar .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
.sidebar .nav-item.active { background: linear-gradient(90deg, rgba(26,122,62,0.2), transparent); border-left-color: var(--secondary); color: var(--secondary); }
.sidebar .nav-item i { width: 24px; }
.sidebar .nav-badge { margin-left: auto; background: var(--secondary); color: #000; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 20px; }
.sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 10px; text-align: center; }

.main-content { margin-left: 260px; min-height: 100vh; }
.top-bar { background: rgba(10,14,10,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; position: sticky; top: 0; z-index: 99; }
.page-title { font-size: 18px; font-weight: 700; }
.top-bar-right { display: flex; align-items: center; gap: 20px; }
.notification-bell { position: relative; cursor: pointer; font-size: 20px; color: var(--text-secondary); }
.notification-bell:hover { color: var(--secondary); }
.notification-bell .badge { position: absolute; top: -8px; right: -10px; background: var(--danger); color: white; border-radius: 50%; min-width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; }
.weather-widget { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 50px; }
.weather-main { display: flex; align-items: center; gap: 12px; }
.weather-icon { font-size: 32px; }
.weather-temp { font-size: 28px; font-weight: 800; }
.spray-advice { padding: 4px 12px; border-radius: 30px; font-size: 11px; font-weight: 600; }
.spray-advice.good { background: rgba(76,175,80,0.2); color: #4caf50; }
.spray-advice.warning { background: rgba(255,152,0,0.2); color: #ff9800; }
.spray-advice.danger { background: rgba(239,68,68,0.2); color: #ef5350; }
.user-info { display: flex; align-items: center; gap: 12px; }
.role-badge { background: rgba(255,183,77,0.2); padding: 4px 12px; border-radius: 40px; font-size: 11px; }
.logout-btn { background: rgba(255,255,255,0.1); border: none; padding: 6px 12px; border-radius: 40px; color: white; cursor: pointer; }

.content-area { padding: 20px 24px; }
.card { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
.card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--secondary); padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
@media (max-width: 1200px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 900px) { .grid-3 { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr; } }
@media (max-width: 768px) { .sidebar { transform: translateX(-100%); width: 240px; } .main-content { margin-left: 0; } }

.form-group { margin-bottom: 16px; }
label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
input, select, textarea { width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 14px; }
input:focus, select:focus { outline: none; border-color: var(--secondary); }

.btn { padding: 10px 20px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, var(--primary-light), var(--primary-dark)); color: white; }
.btn-secondary { background: linear-gradient(135deg, var(--secondary), var(--secondary-dark)); color: #1a1a1a; }
.btn-danger { background: var(--danger); color: white; }
.btn-success { background: var(--success); color: white; }
.btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; }
.btn-sm { padding: 6px 12px; font-size: 11px; }

.table-responsive { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); }
th { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
td { font-size: 13px; }

.badge { display: inline-block; padding: 3px 10px; border-radius: 40px; font-size: 10px; font-weight: 600; }
.badge-pending { background: rgba(255,152,0,0.2); color: #ff9800; }
.badge-approved { background: rgba(76,175,80,0.2); color: #4caf50; }
.badge-completed { background: rgba(76,175,80,0.2); color: #4caf50; }
.badge-active { background: rgba(76,175,80,0.2); color: #4caf50; }

.finance-card { background: linear-gradient(135deg, rgba(26,122,62,0.15), rgba(0,0,0,0.3)); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
.finance-card .amount { font-size: 28px; font-weight: 800; color: var(--secondary); }
.progress-bar { background: rgba(255,255,255,0.1); border-radius: 20px; height: 6px; margin-top: 12px; overflow: hidden; }
.progress-fill { background: linear-gradient(90deg, var(--secondary), var(--primary-light)); height: 100%; width: 0%; transition: width 0.5s; }
.kpi-card { background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.08); }
.kpi-value { font-size: 32px; font-weight: 800; color: var(--secondary); }

.drone-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.drone-card { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; text-align: center; position: relative; }
.drone-card .drone-icon { font-size: 48px; margin-bottom: 10px; }
.drone-card .drone-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.drone-delete { position: absolute; top: 8px; right: 8px; background: rgba(239,68,68,0.8); border: none; color: white; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }

.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
.toast { background: rgba(13,26,13,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 20px; margin-top: 8px; display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal-content { background: var(--darker); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 24px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; }

.receipt-thermal { background: white; color: #111; padding: 20px; border-radius: 16px; font-family: 'Courier New', monospace; font-size: 11px; max-width: 300px; margin: 0 auto; }
.watermark { position: fixed; bottom: 10px; right: 270px; font-size: 9px; color: rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="logo-icon">🚁🌾</div>
    <h1>AgriSpray Pro</h1>
    <div class="subtitle">Enterprise Farm Management System</div>
    <input type="email" id="loginEmail" placeholder="Email Address">
    <div class="password-eye">
      <input type="password" id="loginPassword" placeholder="Password">
      <i class="fas fa-eye" onclick="togglePassword()"></i>
    </div>
    <button onclick="attemptLogin()">Access Dashboard</button>
    <div id="loginError" style="color: var(--danger); font-size: 12px; margin-top: 12px; display: none;"></div>
  </div>
</div>

<div id="mainApp">
  <div class="sidebar">
    <div class="logo"><div class="icon">🚁</div><h2>AgriSpray Pro</h2><p>Enterprise Edition</p></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar-footer"><div id="sidebarTime"></div></div>
  </div>
  <div class="main-content">
    <div class="top-bar">
      <h2 class="page-title" id="pageTitle">📊 Dashboard</h2>
      <div class="top-bar-right">
        <div class="weather-widget" id="weatherWidget">
          <div class="weather-main"><div class="weather-icon" id="weatherIcon">☀️</div><div><div class="weather-temp"><span id="weatherTemp">--</span>°C</div></div></div>
          <div class="spray-advice good" id="sprayAdvice">Checking...</div>
        </div>
        <div class="notification-bell" onclick="showNotifications()">
          <i class="fas fa-bell"></i>
          <span class="badge" id="notificationBadge" style="display: none;">0</span>
        </div>
        <div class="user-info"><span class="role-badge" id="userRoleBadge">Manager</span><span class="user-name" id="userNameDisplay">Adnan</span><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></div>
      </div>
    </div>
    <div class="content-area" id="contentArea"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<div class="watermark">Made by Adnan Ali Ahmad Baloch | AgriSpray Pro © 2026</div>

<div id="viewPasswordModal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3>User Credentials</h3><button class="modal-close" onclick="closeModal('viewPasswordModal')">✕</button></div><div id="passwordContent"></div></div></div>
<div id="printModal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3>Print Invoice</h3><button class="modal-close" onclick="closeModal('printModal')">✕</button></div><div id="printContent"></div><div style="display: flex; gap: 10px; margin-top: 20px;"><button class="btn btn-primary" onclick="printInvoicePDF()">Save PDF</button><button class="btn btn-secondary" onclick="printThermalReceipt()">Thermal Print</button></div></div></div>
<div id="changePasswordModal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3>Change Password</h3><button class="modal-close" onclick="closeModal('changePasswordModal')">✕</button></div><div id="changePwdContent"></div></div></div>
<div id="notificationsModal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3>Notifications</h3><button class="modal-close" onclick="closeModal('notificationsModal')">✕</button></div><div id="notificationsList" style="max-height:400px; overflow-y:auto;"></div></div></div>
<div id="approvalModal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3>Approve Invoice</h3><button class="modal-close" onclick="closeModal('approvalModal')">✕</button></div><div id="approvalContent"></div></div></div>

<script>
// ==================== DEFAULT DATA ====================
const DEFAULT_USERS = [
  { id: "u1", email: "manager@agrispray.com", password: "Admin@123", role: "manager", name: "Adnan Ali", active: true, joinDate: "2024-01-01", salary: 150000, status: "active" },
  { id: "u2", email: "pilot@agrispray.com", password: "Pilot@123", role: "pilot", name: "Ahmed Khan", active: true, joinDate: "2024-02-15", salary: 50000, status: "active" },
  { id: "u3", email: "agri@agrispray.com", password: "Agri@123", role: "agri", name: "Aslam Khan", active: true, joinDate: "2024-03-01", salary: 40000, status: "active" }
];

const PRODUCTS = ["Confidor 250ml/acre", "Ridomil 200g/acre", "Bavistin 300g/acre", "Polyfeed 500g/acre", "Match 300ml/acre", "Actara 200g/acre", "Karate 200ml/acre", "Topsin 250g/acre"];

let appData = {
  users: [],
  drones: [
    { id: "d1", name: "DJI Agras T40", status: "active", totalFlights: 0, totalHours: 0 },
    { id: "d2", name: "DJI Agras T20", status: "active", totalFlights: 0, totalHours: 0 }
  ],
  bookings: [],
  invoices: [],
  expenses: [],
  investments: [],
  notifications: [],
  nextBookingNo: 1,
  nextInvoiceNo: 1,
  totalDroneInvestment: 2000000,
  droneRecovered: 0,
  companyName: "AgriSpray Pro",
  whatsappNumber: ""
};

let currentUser = null;
let currentInvoiceForPrint = null;

function togglePassword() { let i = document.getElementById('loginPassword'), e = event.target; if (i.type === "password") { i.type = "text"; e.classList.replace('fa-eye', 'fa-eye-slash'); } else { i.type = "password"; e.classList.replace('fa-eye-slash', 'fa-eye'); } }
function toast(msg, t = 'success') { let c = document.getElementById('toastContainer'), d = document.createElement('div'); d.className = 'toast'; d.innerHTML = `<i class="fas ${t === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`; c.appendChild(d); setTimeout(() => d.remove(), 3000); }
function formatCurrency(a) { return '₨ ' + (a || 0).toLocaleString(); }
function today() { return new Date().toISOString().slice(0, 10); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function saveData() { localStorage.setItem('agrispray_data', JSON.stringify(appData)); }
function loadData() {
  let saved = localStorage.getItem('agrispray_data');
  if (saved) {
    try {
      let parsed = JSON.parse(saved);
      appData = parsed;
    } catch (e) { }
  }
  for (let du of DEFAULT_USERS) {
    if (!appData.users.find(u => u.id === du.id)) {
      appData.users.push(du);
    }
  }
  if (!appData.nextBookingNo) appData.nextBookingNo = 1;
  if (!appData.nextInvoiceNo) appData.nextInvoiceNo = 1;
  if (!appData.notifications) appData.notifications = [];
  if (!appData.expenses) appData.expenses = [];
  saveData();
}

function addNotification(message, type, targetRole) {
  let notif = { id: Date.now(), message, type, targetRole, timestamp: new Date().toLocaleTimeString(), read: false };
  appData.notifications.unshift(notif);
  saveData();
  updateNotificationBadge();
  if (!targetRole || targetRole === currentUser?.role) toast(message, type);
}

function updateNotificationBadge() {
  let unreadCount = appData.notifications.filter(n => !n.read).length;
  let badge = document.getElementById('notificationBadge');
  if (badge) {
    if (unreadCount > 0) { badge.style.display = 'flex'; badge.innerText = unreadCount > 9 ? '9+' : unreadCount; }
    else badge.style.display = 'none';
  }
}

function showNotifications() {
  let html = appData.notifications.length === 0 ? '<div style="text-align:center;padding:20px;">No notifications</div>' : 
    appData.notifications.map(n => `<div style="padding:12px; border-bottom:1px solid rgba(255,255,255,0.1); ${!n.read ? 'background:rgba(255,183,77,0.1); border-left:3px solid #ffb74d;' : ''}" onclick="markNotificationRead(${n.id})"><i class="fas ${n.type === 'success' ? 'fa-check-circle' : (n.type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle')}" style="color:${n.type === 'success' ? '#4caf50' : (n.type === 'error' ? '#ef5350' : '#ff9800')}; margin-right:10px;"></i> ${n.message}<div style="font-size:10px; color:rgba(255,255,255,0.4); margin-top:4px;">${n.timestamp}</div></div>`).join('');
  document.getElementById('notificationsList').innerHTML = html;
  document.getElementById('notificationsModal').classList.add('open');
}

function markNotificationRead(id) {
  let notif = appData.notifications.find(n => n.id === id);
  if (notif) { notif.read = true; saveData(); updateNotificationBadge(); showNotifications(); }
}

function getBookingNumber() { let num = appData.nextBookingNo; appData.nextBookingNo++; saveData(); return `BK-${String(num).padStart(4, '0')}`; }
function getInvoiceNumber() { let num = appData.nextInvoiceNo; appData.nextInvoiceNo++; saveData(); return `INV-${String(num).padStart(4, '0')}`; }

// ==================== WEATHER ====================
async function fetchWeather() {
  try {
    let r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.1985&longitude=72.0243&current=temperature_2m,wind_speed_10m,precipitation');
    let d = await r.json();
    let temp = Math.round(d.current.temperature_2m);
    let wind = Math.round(d.current.wind_speed_10m);
    let rain = d.current.precipitation || 0;
    document.getElementById('weatherTemp').innerHTML = temp;
    let advice = "", adviceClass = "good";
    if (wind > 20 || rain > 5) { advice = "⚠️ Not Safe for Spray"; adviceClass = "danger"; }
    else if (wind > 15) { advice = "⚠️ Caution Advised"; adviceClass = "warning"; }
    else { advice = "✅ Ideal Spray Time"; adviceClass = "good"; }
    document.getElementById('sprayAdvice').innerHTML = advice;
    document.getElementById('sprayAdvice').className = `spray-advice ${adviceClass}`;
    let icon = rain > 0 ? "🌧️" : (wind > 15 ? "💨" : (temp > 35 ? "🔥" : "☀️"));
    document.getElementById('weatherIcon').innerHTML = icon;
  } catch (e) { }
}
fetchWeather(); setInterval(fetchWeather, 300000);

function updateDateTime() { let now = new Date(); let td = document.getElementById('sidebarTime'); if (td) td.innerHTML = now.toLocaleDateString() + '<br>' + now.toLocaleTimeString(); }
setInterval(updateDateTime, 1000); updateDateTime();

// ==================== AUTHENTICATION ====================
function attemptLogin() {
  let e = document.getElementById('loginEmail').value;
  let p = document.getElementById('loginPassword').value;
  let u = appData.users.find(u => u.email === e && u.password === p && u.active);
  if (u) {
    currentUser = u;
    localStorage.setItem('agrispray_session', JSON.stringify({ id: u.id, role: u.role, name: u.name }));
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('userRoleBadge').innerHTML = u.role === 'manager' ? '👑 Manager' : (u.role === 'pilot' ? '✈️ Pilot' : '🌾 Agri Officer');
    document.getElementById('userNameDisplay').innerHTML = u.name.split(' ')[0];
    buildSidebar();
    showPage('dashboard');
    updateNotificationBadge();
    toast(`Welcome back, ${u.name}!`);
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginError').innerHTML = 'Invalid email or password!';
    setTimeout(() => document.getElementById('loginError').style.display = 'none', 3000);
  }
}

function logout() { localStorage.removeItem('agrispray_session'); currentUser = null; document.getElementById('loginScreen').style.display = 'flex'; document.getElementById('mainApp').style.display = 'none'; }

function checkSession() {
  let s = localStorage.getItem('agrispray_session');
  if (s) {
    try {
      let ses = JSON.parse(s);
      let u = appData.users.find(u => u.id === ses.id && u.active);
      if (u) {
        currentUser = u;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userRoleBadge').innerHTML = u.role === 'manager' ? '👑 Manager' : (u.role === 'pilot' ? '✈️ Pilot' : '🌾 Agri Officer');
        document.getElementById('userNameDisplay').innerHTML = u.name.split(' ')[0];
        buildSidebar();
        showPage('dashboard');

voiceChange()"></div><div><label>Change</label><input id="invChange" readonly></div><input type="hidden" id="invBookingId"></div><button class="btn btn-primary" onclick="createInvoice()">Submit for Approval</button></div><div class="card"><h3 class="card-title">Invoices</h3><div class="table-responsive"><table><thead><tr><th>ID</th><th>Farmer</th><th>Acres</th><th>Total</th><th>Date</th><th>Status</th><th>Action</th></tr></thead><tbody id="invoicesList"></tbody></table></div></div>`;

function deleteInvoiceItem(id) { if (confirm('Delete this invoice?')) { appData.invoices = appData.invoices.filter(i => i.id !== id); saveData(); renderInvoices(); renderDashboard(); toast('Invoice deleted'); } }
function calculateInvoiceTotal() { let a = parseFloat(document.getElementById('invAcres').value) || 0, p = parseFloat(document.getElementById('invPrice').value) || 0, d = parseFloat(document.getElementById('invDiscount').value) || 0, f = Math.max(0, p - d), t = a * f; document.getElementById('invFinalPrice').value = formatCurrency(f); document.getElementById('invTotal').value = formatCurrency(t); calculateInvoiceChange(); }

  let remaining = fortyPool - totalExp;
  document.getElementById('contentArea').innerHTML = `<div class="finance-card"><h4>40% Operational Fund</h4><div class="amount">${formatCurrency(remaining)} Remaining</div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100, (totalExp / (fortyPool || 1)) * 100)}%"></div></div><div>Pool: ${formatCurrency(fortyPool)} | Expenses: ${formatCurrency(totalExp)}</div></div><div class="card"><h3>Add Expense</h3><div class="grid-2"><div><label>Date</label><input type="date" id="expDate" value="${today()}"></div><div><label>Category</label><select id="expCategory"><option>Fuel</option><option>Maintenance</option><option>Salary</option><option>Equipment</option><option>Other</option></select></div><div><label>Amount</label><input type="number" id="expAmount"></div><div><label>Description</label><input id="expDesc"></div></div><button class="btn btn-primary" onclick="addExpense()">Add Expense</button></div><div class="card"><h3>Expense History</h3><div class="table-responsive"><table><thead><tr><th>Date</th><th>Category</th><th>Amount</th><th>Description</th><th>Action</th></tr></thead><tbody id="expensesList"></tbody></table></div></div>`;
  document.getElementById('expensesList').innerHTML = appData.expenses.map(e => `<tr><td>${e.date}</td><td>${e.category}</td><td>${formatCurrency(e.amount)}</td><td>${e.description || '-'}</td><td><button class="btn btn-danger btn-sm" onclick="deleteExpenseItem(${e.id})">Delete</button></td></tr>`).join('') || '<tr><td colspan="5">No expenses</td></tr>';
}
function addExpense() { let amt = parseFloat(document.getElementById('expAmount').value) || 0; if (amt <= 0) { toast('Enter amount', 'error'); return; } let expense = { id: Date.now(), date: document.getElementById('expDate').value, category: document.getElementById('expCategory').value, amount: amt, description: document.getElementById('expDesc').value }; appData.expenses.push(expense); saveData(); renderExpenses(); renderDashboard(); toast(`Expense of ${formatCurrency(amt)} added`); document.getElementById('expAmount').value = ''; document.getElementById('expDesc').value = ''; }
function deleteExpenseItem(id) { if (confirm('Delete this expense?')) { appData.expenses = appData.expenses.filter(e => e.id !== id); saveData(); renderExpenses(); renderDashboard(); toast('Expense deleted - Fund updated'); } }

// ==================== INVESTMENTS, DRONES, EMPLOYEES, SETTINGS ====================
function renderInvestments() { if (currentUser.role !== 'manager') { document.getElementById('contentArea').innerHTML = '<div class="card">Access Denied</div>'; return; } let totalInv = appData.investments.filter(i => i.type === 'investment').reduce((s, i) => s + i.amount, 0); let totalRec = appData.investments.filter(i => i.type === 'recovery').reduce((s, i) => s + i.amount, 0); document.getElementById('contentArea').innerHTML = `<div class="grid-2"><div class="kpi-card"><div class="kpi-value">${formatCurrency(totalInv)}</div><div>Invested</div></div><div class="kpi-card"><div class="kpi-value">${formatCurrency(totalRec)}</div><div>Recovered</div></div></div><div class="card"><h3>Record Transaction</h3><div class="grid-2"><div><label>Investor</label><input id="invPartner"></div><div><label>Amount</label><input type="number" id="invAmount"></div><div><label>Type</label><select id="invType"><option value="investment">Investment</option><option value="recovery">Recovery</option></select></div><div><label>Date</label><input type="date" id="invDate" value="${today()}"></div></div><button class="btn btn-primary" onclick="addInvestment()">Record</button></div><div class="card"><h3>History</h3><div id="investmentsList"></div></div>`; document.getElementById('investmentsList').innerHTML = appData.investments.map(i => `<div>${i.date} - ${i.partner} - ${formatCurrency(i.amount)} - ${i.type}</div>`).join('') || 'No transactions'; }
function addInvestment() { let amt = parseFloat(document.getElementById('invAmount').value) || 0; if (amt <= 0) { toast('Enter amount', 'error'); return; } let type = document.getElementById('invType').value; appData.investments.push({ id: Date.now(), partner: document.getElementById('invPartner').value, amount: amt, type, date: document.getElementById('invDate').value }); if (type === 'investment') appData.totalDroneInvestment += amt; else if (type === 'recovery') appData.droneRecovered += amt; saveData(); renderInvestments(); renderDashboard(); toast('Transaction recorded'); }
function renderDrones() { if (currentUser.role !== 'manager') { document.getElementById('contentArea').innerHTML = '<div class="card">Access Denied</div>'; return; } document.getElementById('contentArea').innerHTML = `<div class="card"><h3>Add New Drone</h3><div class="grid-2"><div><label>Drone Name</label><input id="droneName" placeholder="e.g., DJI Agras T40"></div><div><label>Status</label><select id="droneStatus"><option value="active">Active</option><option value="maintenance">Maintenance</option><option value="inactive">Inactive</option></select></div></div><button class="btn btn-primary" onclick="addDrone()">Add Drone</button></div><div class="card"><h3>Drone Fleet</h3><div class="drone-grid" id="dronesGrid"></div></div>`; document.getElementById('dronesGrid').innerHTML = appData.drones.map(d => `<div class="drone-card"><button class="drone-delete" onclick="deleteDroneItem('${d.id}')"><i class="fas fa-trash"></i></button><div class="drone-icon">🚁</div><div class="drone-name">${d.name}</div><div>Status: ${d.status}</div><div>Flights: ${d.totalFlights || 0}</div><div>Hours: ${(d.totalHours || 0).toFixed(1)}</div><div style="display:flex; gap:8px; justify-content:center; margin-top:10px;"><button class="btn btn-sm btn-success" onclick="updateDroneStatus('${d.id}','active')">Active</button><button class="btn btn-sm btn-warning" onclick="updateDroneStatus('${d.id}','maintenance')">Maint</button><button class="btn btn-sm btn-danger" onclick="updateDroneStatus('${d.id}','inactive')">Inactive</button></div></div>`).join(''); }
function updateDroneStatus(did, status) { let d = appData.drones.find(d => d.id === did); if (d) { d.status = status; saveData(); renderDrones(); toast(`${d.name} status updated to ${status}`); } }
function addDrone() { let n = document.getElementById('droneName').value, s = document.getElementById('droneStatus').value; if (!n) { toast('Enter drone name', 'error'); return; } appData.drones.push({ id: "DR" + Date.now(), name: n, status: s, totalFlights: 0, totalHours: 0 }); saveData(); renderDrones(); toast(`Drone ${n} added`); document.getElementById('droneName').value = ''; }
function deleteDroneItem(id) { if (confirm('Remove this drone permanently?')) { appData.drones = appData.drones.filter(d => d.id !== id); saveData(); renderDrones(); toast('Drone removed'); } }
function renderEmployees() { if (currentUser.role !== 'manager') { document.getElementById('contentArea').innerHTML = '<div class="card">Access Denied</div>'; return; } document.getElementById('contentArea').innerHTML = `<div class="card"><h3>Add Employee</h3><div class="grid-2"><div><label>Full Name</label><input id="empName"></div><div><label>Email</label><input id="empEmail"></div><div><label>Password</label><input id="empPassword"></div><div><label>Role</label><select id="empRole"><option value="pilot">Drone Pilot</option><option value="agri">Agri Officer</option></select></div><div><label>Monthly Salary</label><input type="number" id="empSalary"></div><div><label>Join Date</label><input type="date" id="empJoinDate" value="${today()}"></div></div><button class="btn btn-primary" onclick="addEmployee()">Add Employee</button></div><div class="card"><h3>Team Members</h3><div class="table-responsive"><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Salary</th><th>Status</th><th>Actions</th></tr></thead><tbody id="employeesList"></tbody></table></div></div><div class="card"><button class="btn btn-success" onclick="processMonthlySalary()">Process Monthly Salary</button><button class="btn btn-secondary" onclick="openChangePassword()">Change My Password</button></div>`; document.getElementById('employeesList').innerHTML = appData.users.map(u => `<tr><td>${u.name}</td><td>${u.email}</td><td>${u.role}</td><td>${formatCurrency(u.salary || 0)}</td><td><span class="badge ${u.status === 'active' ? 'badge-active' : 'badge-pending'}">${u.status}</span></td><td><button class="btn btn-sm btn-outline" onclick="viewEmployeePassword('${u.id}')"><i class="fas fa-eye"></i></button> <button class="btn btn-sm btn-success" onclick="updateEmployeeStatus('${u.id}','active')">Active</button> <button class="btn btn-sm btn-danger" onclick="updateEmployeeStatus('${u.id}','inactive')">Inactive</button> ${u.id !== 'u1' ? `<button class="btn btn-sm btn-danger" onclick="deleteEmployeeItem('${u.id}')">Delete</button>` : ''}</td></tr>`).join(''); }
function addEmployee() { let name = document.getElementById('empName').value, email = document.getElementById('empEmail').value, password = document.getElementById('empPassword').value, role = document.getElementById('empRole').value, salary = parseFloat(document.getElementById('empSalary').value) || 0; if (!name || !email || !password) { toast('Fill all fields', 'error'); return; } if (appData.users.find(u => u.email === email)) { toast('Email exists', 'error'); return; } appData.users.push({ id: "u" + (appData.users.length + 1), email, password, role, name, active: true, joinDate: document.getElementById('empJoinDate').value || today(), salary, status: 'active' }); saveData(); renderEmployees(); toast(`Employee ${name} added`); }
function updateEmployeeStatus(uid, status) { let u = appData.users.find(u => u.id === uid); if (u) { u.status = status; u.active = (status === 'active'); saveData(); renderEmployees(); toast(`${u.name} status updated`); } }
function deleteEmployeeItem(uid) { if (confirm('Delete employee permanently?')) { appData.users = appData.users.filter(u => u.id !== uid); saveData(); renderEmployees(); toast('Employee deleted'); } }
function viewEmployeePassword(uid) { let u = appData.users.find(u => u.id === uid); if (u) { document.getElementById('passwordContent').innerHTML = `<div><label>Name:</label> ${u.name}</div><div><label>Email:</label> ${u.email}</div><div><label>Password:</label> <input type="text" value="${u.password}" readonly style="background:#333; width:100%;"></div><div><label>Login Link:</label> <input type="text" value="${window.location.href}" readonly style="width:100%;"></div><button class="btn btn-primary" style="margin-top:15px;" onclick="closeModal('viewPasswordModal')">Close</button>`; document.getElementById('viewPasswordModal').classList.add('open'); } }
function processMonthlySalary() { let total = appData.users.filter(u => u.active && u.status === 'active').reduce((s, u) => s + (u.salary || 0), 0); if (total > 0) { appData.expenses.push({ id: Date.now(), date: today(), category: 'Salary', amount: total, description: `Monthly salary payment for ${appData.users.filter(u => u.active && u.status === 'active').length} employees` }); saveData(); renderExpenses(); renderDashboard(); toast(`Salary processed: ${formatCurrency(total)}`); } }
function renderSettings() { document.getElementById('contentArea').innerHTML = `<div class="card"><h3>Settings</h3><div><label>Company Name</label><input id="compName" value="${appData.companyName}"></div><div><label>WhatsApp Number</label><input id="waNum" value="${appData.whatsappNumber}"></div><button class="btn btn-primary" onclick="saveSettings()">Save Settings</button><button class="btn btn-secondary" onclick="openChangePassword()">Change My Password</button></div>`; }
function saveSettings() { appData.companyName = document.getElementById('compName').value; appData.whatsappNumber = document.getElementById('waNum').value; saveData(); toast('Settings saved'); }
function openChangePassword() { document.getElementById('changePwdContent').innerHTML = `<div><label>Current Password</label><input type="password" id="oldPwd"></div><div><label>New Password</label><input type="password" id="newPwd"></div><div><label>Confirm</label><input type="password" id="confirmPwd"></div><button class="btn btn-primary" onclick="changePassword()">Change</button>`; document.getElementById('changePasswordModal').classList.add('open'); }
function changePassword() { let old = document.getElementById('oldPwd').value, newP = document.getElementById('newPwd').value, con = document.getElementById('confirmPwd').value; if (old !== currentUser.password) { toast('Current password incorrect', 'error'); return; } if (newP !== con) { toast('Passwords do not match', 'error'); return; } currentUser.password = newP; let idx = appData.users.findIndex(u => u.id === currentUser.id); if (idx !== -1) appData.users[idx].password = newP; saveData(); closeModal('changePasswordModal'); toast('Password changed successfully!'); }

function showPage(page) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  let titles = { dashboard: '📊 Dashboard', bookings: '📋 Bookings', invoices: '💰 Invoices', expenses: '📉 Expenses', investments: '📈 Investments', drones: '🚁 Drones', employees: '👥 Employees', settings: '⚙️ Settings' };
  document.getElementById('pageTitle').innerHTML = titles[page] || page;
  if (page === 'dashboard') renderDashboard();
  else if (page === 'bookings') renderBookings();
  else if (page === 'invoices') renderInvoices();
  else if (page === 'expenses') renderExpenses();
  else if (page === 'investments') renderInvestments();
  else if (page === 'drones') renderDrones();
  else if (page === 'employees') renderEmployees();
  else if (page === 'settings') renderSettings();
}

loadData();
if (!checkSession()) { document.getElementById('loginScreen').style.display = 'flex'; document.getElementById('mainApp').style.display = 'none'; }
</script>
</body>
</html>
