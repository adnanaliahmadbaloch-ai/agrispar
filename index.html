<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const cfg = {
  apiKey:"AIzaSyDCXPRlN5CVmfZgpO7_NE2hRCqCr0h5mqY",
  authDomain:"agrispray-pro.firebaseapp.com",
  databaseURL:"https://agrispray-pro-default-rtdb.firebaseio.com",
  projectId:"agrispray-pro",
  storageBucket:"agrispray-pro.firebasestorage.app",
  messagingSenderId:"72689059265",
  appId:"1:72689059265:web:48bd60e10f5f11d199db40"
};
const app = initializeApp(cfg);
const db = getDatabase(app);
window.FB = { db, ref, set, onValue, update, get };
window.firebaseReady = true;

// Connection badge
onValue(ref(db,'.info/connected'), snap => {
  window.isOnline = snap.val()===true;
  const b = document.getElementById('syncBadge');
  if (!b) return;
  if (window.isOnline) {
    b.innerHTML='🟢 Live'; b.style.color='#4caf50'; b.style.background='rgba(76,175,80,0.15)';
    // flush offline queue
    (window._q||[]).forEach(f=>{try{f();}catch(e){}});
    window._q=[];
    window.doSync && window.doSync();
  } else {
    b.innerHTML='🔴 Offline'; b.style.color='#ff9800'; b.style.background='rgba(255,152,0,0.15)';
  }
});

window._fbListen = function() {
  // BOOKINGS real-time
  onValue(ref(db,'bookings'), snap => {
    if (!window.AD) return;
    const data = snap.val();
    // If Firebase has no bookings, trust local data — don't wipe it
    if (!data) return;
    const deletedBK = window.AD.deletedBKIds || [];
    let changed=false;
    Object.values(data).forEach(fb => {
      if (!fb || !fb.id) return;
      if (deletedBK.includes(fb.id)) return;
      const i = window.AD.bookings.findIndex(b=>b.id===fb.id);
      if (i===-1) {
        window.AD.bookings.push(fb); changed=true;
        if (window.CU?.role==='pilot' && fb.assignedTo===window.CU.id)
          window._ntf(`🆕 New booking ${fb.id} — ${fb.farmer}`, 'info');
        if (window.CU?.role==='manager')
          window._ntf(`🆕 Booking ${fb.id} by ${fb.createdByName||'staff'}`, 'info');
      } else {
        if (window.AD.bookings[i].status !== fb.status) {
          changed=true;
          if (fb.status==='completed') {
            window._ntf(`✅ Booking ${fb.id} completed by ${fb.completedByName||'Pilot'}`, 'success');
            window._saveNotif(`✅ Booking ${fb.id} completed by ${fb.completedByName||'Pilot'}`, 'success');
          }
        }
        window.AD.bookings[i] = fb;
      }
    });
    if (changed) {
      localStorage.setItem('asp_data', JSON.stringify(window.AD));
      window._refreshPage && window._refreshPage('bookings');
      window._refreshPage && window._refreshPage('dashboard');
      window._refreshPage && window._refreshPage('invoices');
    }
  });

  // INVOICES real-time
  onValue(ref(db,'invoices'), snap => {
    if (!window.AD) return;
    const data = snap.val();
    // If Firebase has no invoices, trust local data — don't wipe it
    // Local deletions are tracked in deletedINVIds
    if (!data) return;
    const deletedINV = window.AD.deletedINVIds || [];
    let changed=false;
    Object.values(data).forEach(fb => {
      if (!fb || !fb.id) return;
      if (deletedINV.includes(fb.id)) return;
      const i = window.AD.invoices.findIndex(x=>x.id===fb.id);
      if (i===-1) {
        window.AD.invoices.push(fb); changed=true;
        if (window.CU?.role==='manager')
          window._ntf(`📄 Invoice ${fb.id} from ${fb.createdByName||'staff'}`, 'info');
      } else {
        if (window.AD.invoices[i].status!==fb.status) {
          changed=true;
          if (window.CU?.role!=='manager') {
            const msg = fb.status==='approved' ? `✅ Invoice ${fb.id} approved!` : `❌ Invoice ${fb.id} rejected`;
            window._ntf(msg, fb.status==='approved'?'success':'error');
            window._saveNotif(msg, fb.status==='approved'?'success':'error');
          }
        }
        window.AD.invoices[i]=fb;
      }
    });
    if (changed) {
      localStorage.setItem('asp_data', JSON.stringify(window.AD));
      window._refreshPage && window._refreshPage('invoices');
      window._refreshPage && window._refreshPage('dashboard');
    }
  });

  // USERS real-time
  onValue(ref(db,'users'), snap => {
    const data = snap.val(); if (!data||!window.AD) return;
    Object.values(data).forEach(fu => {
      const i = window.AD.users.findIndex(u=>u.id===fu.id);
      if (i===-1) window.AD.users.push(fu);
      else window.AD.users[i]={...window.AD.users[i],...fu};
    });
    localStorage.setItem('asp_data', JSON.stringify(window.AD));
  });
};
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --g1:#0d6b35;--g2:#0a8a42;--g3:#064a22;--g4:#031a0d;
  --gold:#f5a623;--goldd:#e8951a;--gold2:#ffd166;
  --accent:#06d6a0;--accent2:#00b4d8;--purple:#7b5ea7;
  --red:#e63946;--grn:#2dc653;--warn:#f4a261;
  --bg:#050d07;--bg2:#080f09;--bg3:#0b1a0e;
  --card:rgba(255,255,255,0.025);--card2:rgba(255,255,255,0.045);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --t1:#f8faf8;--t2:rgba(248,250,248,0.72);--t3:rgba(248,250,248,0.38);--t4:rgba(248,250,248,0.18);
  --shadow:0 8px 32px rgba(0,0,0,0.6);--shadow2:0 2px 12px rgba(0,0,0,0.4);
  --radius:16px;--radius2:12px;--radius3:8px;
}
html{scroll-behavior:smooth;height:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(ellipse 80% 50% at 10% 0%,rgba(13,107,53,0.15) 0%,transparent 60%),
                   radial-gradient(ellipse 60% 40% at 90% 100%,rgba(6,214,160,0.06) 0%,transparent 50%);}

/* ─── LOGIN ─── */
.login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;
  background:radial-gradient(ellipse 100% 100% at 30% 30%,rgba(13,107,53,0.25),var(--bg4,#030805));}
.login-card{width:440px;max-width:100%;background:rgba(255,255,255,0.03);backdrop-filter:blur(40px) saturate(1.5);
  border:1px solid var(--border2);border-radius:28px;padding:44px 40px;text-align:center;
  box-shadow:0 32px 80px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.08);}
.login-logo{font-size:52px;margin-bottom:16px;display:block;filter:drop-shadow(0 4px 16px rgba(245,166,35,0.4));}
.login-card h1{font-size:30px;font-weight:900;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#fff 30%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.login-sub{font-size:11px;color:var(--t3);margin-bottom:32px;letter-spacing:2px;text-transform:uppercase;}
.login-field{position:relative;margin-bottom:14px;}
.login-field input{width:100%;padding:14px 18px;background:rgba(0,0,0,0.4);border:1px solid var(--border2);
  border-radius:50px;color:var(--t1);font-size:14px;font-family:'Inter',sans-serif;
  transition:all 0.25s;letter-spacing:0.3px;}
.login-field input:focus{outline:none;border-color:var(--gold);background:rgba(0,0,0,0.55);
  box-shadow:0 0 0 3px rgba(245,166,35,0.12);}
.login-field .eye{position:absolute;right:18px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--t3);font-size:14px;}
.login-btn{width:100%;padding:14px;margin-top:6px;
  background:linear-gradient(135deg,var(--g1),var(--g2),var(--g3));
  border:none;border-radius:50px;color:#fff;font-weight:700;font-size:15px;
  cursor:pointer;letter-spacing:0.5px;transition:all 0.25s;
  box-shadow:0 4px 20px rgba(13,107,53,0.5);}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(13,107,53,0.65);}
.login-btn:active{transform:translateY(0);}
.login-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.login-err{color:var(--red);font-size:12px;margin-top:12px;display:none;
  padding:10px 16px;background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.2);border-radius:10px;}
.login-version{margin-top:20px;font-size:10px;color:var(--t4);}

/* ─── LAYOUT ─── */
#mainApp{display:none;}
.sidebar{position:fixed;top:0;left:0;width:260px;height:100vh;z-index:200;overflow-y:auto;overflow-x:hidden;
  background:rgba(5,10,6,0.97);backdrop-filter:blur(20px);
  border-right:1px solid var(--border);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column;}
.sidebar.hidden{transform:translateX(-100%);}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-shrink:0;}
.sidebar-logo .logo-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--g1),var(--g3));font-size:22px;flex-shrink:0;
  box-shadow:0 4px 14px rgba(13,107,53,0.5);}
.sidebar-logo h2{font-size:14px;font-weight:800;color:var(--t1);letter-spacing:-0.2px;line-height:1.2;}
.sidebar-logo p{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
nav{padding:12px 0;flex:1;}
.nav-sec{font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:2px;padding:14px 22px 6px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 20px;cursor:pointer;color:var(--t3);
  transition:all 0.2s;border-left:3px solid transparent;font-size:13px;font-weight:500;margin:1px 0;position:relative;}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--t1);}
.nav-item.active{background:linear-gradient(90deg,rgba(13,107,53,0.25),transparent);
  border-left-color:var(--gold);color:var(--gold);}
.nav-item.active i{color:var(--gold);}
.nav-item i{width:18px;font-size:13px;text-align:center;color:var(--t4);transition:color 0.2s;}
.nav-item:hover i{color:var(--t2);}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;
  min-width:18px;height:18px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;padding:0 5px;}
.sidebar-foot{padding:16px 20px;border-top:1px solid var(--border);flex-shrink:0;}
.sidebar-clock{font-size:11px;color:var(--t3);text-align:center;line-height:1.6;}

.main-wrap{margin-left:260px;min-height:100vh;transition:margin 0.3s;}
.topbar{background:rgba(5,10,6,0.92);backdrop-filter:blur(20px) saturate(1.5);
  border-bottom:1px solid var(--border);padding:0 24px;height:60px;
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.menu-toggle{display:none;background:var(--card2);border:1px solid var(--border);color:var(--t2);
  width:36px;height:36px;border-radius:var(--radius3);cursor:pointer;font-size:15px;
  align-items:center;justify-content:center;transition:all 0.2s;}
.menu-toggle:hover{background:var(--card);color:var(--t1);}
.page-ttl{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-0.2px;}
.topbar-right{display:flex;align-items:center;gap:10px;}

/* Weather */
.weather-pill{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.5);
  border:1px solid var(--border2);padding:7px 14px;border-radius:50px;cursor:default;}
.weather-pill .wicon{font-size:20px;line-height:1;}
.weather-pill .wtemp{font-size:16px;font-weight:800;color:var(--t1);}
.weather-pill .wdetails{display:flex;flex-direction:column;gap:1px;}
.weather-pill .wloc{font-size:10px;font-weight:600;color:var(--t2);}
.weather-pill .wstats{display:flex;gap:6px;}
.weather-pill .wstat{font-size:9px;color:var(--t3);}
.spray-tag{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0.5px;white-space:nowrap;}
.spray-good{background:rgba(45,198,83,0.15);color:var(--grn);border:1px solid rgba(45,198,83,0.2);}
.spray-warn{background:rgba(244,162,97,0.15);color:var(--warn);border:1px solid rgba(244,162,97,0.2);}
.spray-bad{background:rgba(230,57,70,0.15);color:var(--red);border:1px solid rgba(230,57,70,0.2);}

.topbar-divider{width:1px;height:24px;background:var(--border);}
.bell-wrap{position:relative;cursor:pointer;width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;background:var(--card);
  border:1px solid var(--border);color:var(--t2);font-size:15px;transition:all 0.2s;}
.bell-wrap:hover{background:var(--card2);color:var(--t1);}
.bell-dot{position:absolute;top:5px;right:5px;background:var(--red);color:#fff;border-radius:50%;
  min-width:14px;height:14px;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:700;
  border:2px solid var(--bg);}
#syncBadge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:0.3px;white-space:nowrap;}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--card);
  border:1px solid var(--border);border-radius:50px;padding:5px 14px 5px 6px;}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--gold));
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;}
.role-tag{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:0.5px;text-transform:uppercase;}
.uname{font-size:12px;font-weight:600;color:var(--t1);}
.logout-btn{background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.2);
  padding:5px 12px;border-radius:30px;color:var(--red);cursor:pointer;font-size:11px;
  font-weight:600;transition:all 0.2s;font-family:'Inter',sans-serif;}
.logout-btn:hover{background:rgba(230,57,70,0.2);}

.content{padding:24px;padding-bottom:50px;max-width:1400px;}

/* ─── CARDS ─── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;margin-bottom:18px;transition:border-color 0.2s;}
.card:hover{border-color:var(--border2);}
.card-title{font-size:13px;font-weight:700;color:var(--gold);display:flex;align-items:center;
  gap:8px;padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid var(--border);}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}

/* ─── KPI CARDS ─── */
.kpi{position:relative;overflow:hidden;border-radius:var(--radius);padding:22px;
  border:1px solid var(--border);background:var(--card);transition:all 0.3s;}
.kpi::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:0 0 0 80px;opacity:0.06;}
.kpi:hover{transform:translateY(-2px);border-color:var(--border2);box-shadow:var(--shadow2);}
.kpi-icon{font-size:28px;margin-bottom:12px;display:block;}
.kpi-val{font-size:26px;font-weight:900;letter-spacing:-0.5px;line-height:1;}
.kpi-lbl{font-size:11px;color:var(--t3);margin-top:5px;font-weight:500;letter-spacing:0.3px;}
.kpi-trend{font-size:10px;margin-top:8px;display:flex;align-items:center;gap:4px;}
.kpi-green::before{background:var(--grn);}
.kpi-red::before{background:var(--red);}
.kpi-blue::before{background:var(--accent2);}
.kpi-warn::before{background:var(--warn);}

/* ─── FORMS ─── */
label{display:block;font-size:10px;font-weight:700;color:var(--t3);margin-bottom:6px;
  text-transform:uppercase;letter-spacing:0.8px;}
input,select,textarea{width:100%;padding:11px 14px;background:rgba(0,0,0,0.4);
  border:1px solid var(--border2);border-radius:var(--radius3);color:var(--t1);
  font-size:13px;transition:all 0.2s;font-family:'Inter',sans-serif;letter-spacing:0.2px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);
  background:rgba(0,0,0,0.55);box-shadow:0 0 0 3px rgba(245,166,35,0.08);}
input::placeholder{color:var(--t4);}
select option{background:#0b1a0e;color:var(--t1);}
input[readonly]{opacity:0.65;cursor:default;border-style:dashed;}
textarea{resize:vertical;min-height:64px;}

/* ─── BUTTONS ─── */
.btn{padding:9px 18px;border-radius:50px;border:none;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;font-size:12px;
  transition:all 0.2s;font-family:'Inter',sans-serif;letter-spacing:0.3px;white-space:nowrap;}
.btn:active{transform:scale(0.96);}
.btn:hover{filter:brightness(1.1);}
.btn-primary{background:linear-gradient(135deg,#0d6b35,#0a8a42);color:#fff;
  box-shadow:0 2px 12px rgba(13,107,53,0.35);}
.btn-secondary{background:linear-gradient(135deg,var(--gold),var(--goldd));color:#1a0f00;font-weight:700;}
.btn-danger{background:linear-gradient(135deg,#c62828,var(--red));color:#fff;}
.btn-success{background:linear-gradient(135deg,#1b5e20,var(--grn));color:#fff;}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--t2);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm{padding:6px 14px;font-size:11px;}
.btn-xs{padding:4px 10px;font-size:10px;border-radius:20px;}

/* ─── TABLE ─── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius2);
  border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;min-width:480px;}
thead{background:rgba(0,0,0,0.4);}
th{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;
  padding:11px 12px;white-space:nowrap;border-bottom:1px solid var(--border);}
td{font-size:12px;padding:11px 12px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background 0.15s;}
tbody tr:hover td{background:rgba(255,255,255,0.025);}

/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:30px;font-size:10px;font-weight:700;letter-spacing:0.3px;}
.b-pending{background:rgba(244,162,97,0.15);color:var(--warn);border:1px solid rgba(244,162,97,0.2);}
.b-completed{background:rgba(45,198,83,0.15);color:var(--grn);border:1px solid rgba(45,198,83,0.2);}
.b-approved{background:rgba(0,180,216,0.15);color:var(--accent2);border:1px solid rgba(0,180,216,0.2);}
.b-rejected{background:rgba(230,57,70,0.15);color:var(--red);border:1px solid rgba(230,57,70,0.2);}
.b-active{background:rgba(45,198,83,0.15);color:var(--grn);border:1px solid rgba(45,198,83,0.2);}
.b-inactive{background:rgba(230,57,70,0.15);color:var(--red);border:1px solid rgba(230,57,70,0.2);}
.b-fired{background:rgba(183,28,28,0.2);color:#ef9a9a;border:1px solid rgba(183,28,28,0.3);}
.b-manager{background:rgba(245,166,35,0.15);color:var(--gold);border:1px solid rgba(245,166,35,0.2);}
.b-pilot{background:rgba(0,180,216,0.15);color:var(--accent2);border:1px solid rgba(0,180,216,0.2);}
.b-agri{background:rgba(45,198,83,0.15);color:var(--grn);border:1px solid rgba(45,198,83,0.2);}
.b-invoiced{background:rgba(123,94,167,0.15);color:#b39ddb;border:1px solid rgba(123,94,167,0.2);}

/* ─── MODAL ─── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);
  z-index:500;align-items:center;justify-content:center;padding:16px;}
.modal.open{display:flex;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-box{background:#0b1a0e;border:1px solid var(--border2);border-radius:24px;
  padding:26px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;
  box-shadow:0 40px 100px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,255,255,0.05);}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-hdr h3{font-size:15px;font-weight:700;color:var(--gold);}
.modal-close{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--t2);
  width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.modal-close:hover{background:rgba(230,57,70,0.15);border-color:rgba(230,57,70,0.3);color:var(--red);}

/* ─── TOAST ─── */
.toast-wrap{position:fixed;bottom:24px;right:20px;z-index:9000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:rgba(8,16,9,0.97);backdrop-filter:blur(20px);
  border:1px solid var(--border2);border-radius:var(--radius2);
  padding:11px 18px;display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:500;animation:slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
  max-width:340px;pointer-events:all;box-shadow:var(--shadow);}
@keyframes slideUp{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* ─── FINANCE ─── */
.fin-card{background:linear-gradient(135deg,rgba(13,107,53,0.1),rgba(0,0,0,0.3));
  border:1px solid rgba(13,107,53,0.2);border-radius:var(--radius);padding:20px;margin-bottom:18px;}
.fin-amt{font-size:28px;font-weight:900;color:var(--gold);letter-spacing:-0.5px;}
.progress-bar{background:rgba(255,255,255,0.06);border-radius:20px;height:4px;margin:12px 0;overflow:hidden;}
.progress-fill{background:linear-gradient(90deg,var(--gold),var(--g1));height:100%;transition:width 0.6s ease;}

/* ─── ASSET CARDS ─── */
.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.asset-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;position:relative;transition:all 0.3s;text-align:center;}
.asset-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow2);}
.asset-icon{font-size:42px;margin-bottom:10px;display:block;filter:drop-shadow(0 4px 12px rgba(245,166,35,0.3));}
.asset-name{font-size:14px;font-weight:700;margin-bottom:8px;}
.asset-del{position:absolute;top:10px;right:10px;background:rgba(230,57,70,0.15);
  border:1px solid rgba(230,57,70,0.2);color:var(--red);width:26px;height:26px;
  border-radius:50%;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;}
.asset-del:hover{background:rgba(230,57,70,0.3);}

/* ─── RECEIPT ─── */
.receipt{background:#fff;color:#111;padding:14px;font-family:'Courier New',monospace;
  font-size:11px;width:280px;margin:0 auto;border-radius:10px;line-height:1.6;}
.receipt hr{border:none;border-top:1px dashed #bbb;margin:7px 0;}
.receipt .rh{text-align:center;font-weight:bold;}
.receipt .rf{text-align:center;font-size:10px;color:#555;}

/* ─── OVERLAY ─── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:150;backdrop-filter:blur(2px);}
.overlay.show{display:block;}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2);}

/* ─── RESPONSIVE ─── */
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr);}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main-wrap{margin-left:0;}
  .menu-toggle{display:flex;}
  .weather-pill .wstats{display:none;}
  .weather-pill .wloc{display:none;}
  #syncBadge{display:none;}
  .g2,.g3{grid-template-columns:1fr;}
  .g4{grid-template-columns:repeat(2,1fr);}
  .content{padding:14px 12px 60px;}
  .topbar{padding:0 14px;height:56px;}
}
@media(max-width:480px){
  .g4{grid-template-columns:1fr;}
  .login-card{padding:32px 22px;}
  .login-card h1{font-size:24px;}
  .kpi-val{font-size:22px;}
}
.watermark{position:fixed;bottom:6px;right:10px;font-size:9px;color:rgba(255,255,255,0.06);pointer-events:none;letter-spacing:1px;}
</style>

<script>
// ============================================================
// DATA LAYER
// ============================================================
const DEF_USERS = [
  {id:'u1',email:'manager@agrispray.com',password:'Admin@123',role:'manager',designation:'Manager',name:'Adnan Ali',active:true,joinDate:'2024-01-01',salary:150000,status:'active',phone:'',cnic:'',access:['all']},
  {id:'u2',email:'pilot@agrispray.com',password:'Pilot@123',role:'pilot',designation:'Drone Pilot',name:'Ahmed Khan',active:true,joinDate:'2024-02-15',salary:50000,status:'active',phone:'',cnic:'',access:['dashboard','bookings','invoices']},
  {id:'u3',email:'agri@agrispray.com',password:'Agri@123',role:'agri',designation:'Agri Officer',name:'Aslam Khan',active:true,joinDate:'2024-03-01',salary:40000,status:'active',phone:'',cnic:'',access:['dashboard','bookings']}
];
const DESIGNATIONS = ['Manager','Accountant','Agri Officer','Drone Pilot','Helper / Farm Laborer','Driver','Technician','Supervisor','Agronomist','Warehouse Manager','Admin / HR','Other'];
const EXPENSE_CATS = ['Fuel','Electricity Bill','Gas Bill','Maintenance','Salary','Equipment','Labour','Seeds','Fertilizers','Pesticides','Other'];

const BLANK = {
  users:[],
  drones:[
    {id:'d1',name:'DJI Agras T40',status:'active',flights:0,hours:0,fuel:0,lastService:'',serviceHistory:[]},
    {id:'d2',name:'DJI Agras T20',status:'active',flights:0,hours:0,fuel:0,lastService:'',serviceHistory:[]}
  ],
  generators:[
    {id:'g1',name:'Generator 5KVA',status:'active',fuelUsed:0,hoursRun:0,lastService:'',serviceHistory:[]}
  ],
  bookings:[],invoices:[],expenses:[],investments:[],
  notifications:[],
  nextBK:1,nextINV:1,
  invest:0,recovered:0,
  company:'AgriSpray Pro',waNum:'',
  expCats:EXPENSE_CATS
};

window.AD = {};
Object.assign(window.AD, JSON.parse(JSON.stringify(BLANK)));
let AD = window.AD;
let CU = null;
window.CU = null;
let _invPrint = null;
window._page = 'dashboard';

// ── Persist ──
function save() {
  localStorage.setItem('asp_data', JSON.stringify(AD));
  window.AD = AD;
  doSync();
}
window.doSync = function() {
  if (!window.firebaseReady || !window.FB) {
    (window._q = window._q||[]).push(()=>doSync()); return;
  }
  try {
    const o = a => { if(!a||!a.length) return null; const r={}; a.forEach(x=>{if(x&&x.id)r[x.id]=x;}); return r; };
    const {db,ref,set} = window.FB;
    // Always write — null clears Firebase when array is empty
    set(ref(db,'bookings'), o(AD.bookings)).catch(()=>{});
    set(ref(db,'invoices'), o(AD.invoices)).catch(()=>{});
    set(ref(db,'users'),    o(AD.users)).catch(()=>{});
    if (AD.investments&&AD.investments.length) set(ref(db,'investments'),o(AD.investments)).catch(()=>{});
  } catch(e) {}
};

function load() {
  const s = localStorage.getItem('asp_data');
  if (s) { try { Object.assign(AD, JSON.parse(s)); window.AD=AD; } catch(e){} }
  // Only inject default users whose IDs have never been saved yet
  // If a default user was deleted, their ID will be in AD.deletedDefaults — don't re-add
  if (!AD.deletedDefaults) AD.deletedDefaults = [];
  DEF_USERS.forEach(du=>{
    if (AD.deletedDefaults.includes(du.id)) return; // user was explicitly deleted — leave them gone
    if (!AD.users.find(u=>u.id===du.id)) AD.users.push(du);
  });
  ['nextBK','nextINV'].forEach(k=>{ if (!AD[k]) AD[k]=1; });
  if (!AD.notifications) AD.notifications=[];
  if (!AD.generators) AD.generators=JSON.parse(JSON.stringify(BLANK.generators));
  if (!AD.expCats) AD.expCats=EXPENSE_CATS;
  if (!AD.deletedBKIds) AD.deletedBKIds=[];
  if (!AD.deletedINVIds) AD.deletedINVIds=[];
  // Patch any users missing proper access arrays
  AD.users.forEach(u=>{
    if (!u.access||u.access.length===0) {
      u.access = [...(ROLE_ACCESS[u.role]||['dashboard','bookings'])];
    }
  });
  localStorage.setItem('asp_data', JSON.stringify(AD));
  setTimeout(()=>{ window._fbListen && window._fbListen(); }, 900);
}

// Always compute recovered live from approved invoices — never trust stored value
function getRecovered() {
  return AD.invoices.filter(i=>i.status==='approved').reduce((s,i)=>s+(i.total*0.6),0);
}
function getRevenue() {
  return AD.invoices.filter(i=>i.status==='approved').reduce((s,i)=>s+i.total,0);
}
function getAcres() {
  return AD.invoices.filter(i=>i.status==='approved').reduce((s,i)=>s+i.acres,0);
}
function fc(a){ return '₨ '+(a||0).toLocaleString(); }
function today(){ return new Date().toISOString().slice(0,10); }
function bkNum(){ const n=AD.nextBK; AD.nextBK++; return `BK-${String(n).padStart(4,'0')}`; }
function invNum(){ const n=AD.nextINV; AD.nextINV++; return `INV-${String(n).padStart(4,'0')}`; }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function openModal(id){ document.getElementById(id).classList.add('open'); }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
function togglePwd(){ const i=document.getElementById('lPwd'); i.type=i.type==='password'?'text':'password'; }

function toast(msg, type='success') {
  const w=document.getElementById('toasts');
  const d=document.createElement('div'); d.className='toast';
  const ico = type==='success'?'fa-check-circle':type==='error'?'fa-times-circle':'fa-info-circle';
  const col = type==='success'?'#4caf50':type==='error'?'#ef5350':'#ff9800';
  d.innerHTML=`<i class="fas ${ico}" style="color:${col}"></i> ${msg}`;
  w.appendChild(d); setTimeout(()=>d.remove(), 3500);
}
window._ntf = (msg,type)=>{ if(!CU) return; toast(msg,type); };
window._saveNotif = function(msg,type) {
  if(!CU) return;
  AD.notifications.unshift({id:Date.now()+Math.random(),msg,type,ts:new Date().toLocaleTimeString(),read:false});
  localStorage.setItem('asp_data',JSON.stringify(AD));
  updateNotifBadge();
};

function addNotif(msg, type, targetRole) {
  const n={id:Date.now()+Math.random(),msg,type,targetRole,ts:new Date().toLocaleTimeString(),read:false};
  AD.notifications.unshift(n);
  save(); updateNotifBadge();
  if (!targetRole || targetRole===CU?.role || targetRole===CU?.id) toast(msg, type);
}

function updateNotifBadge() {
  const cnt = AD.notifications.filter(n=>!n.read).length;
  const d=document.getElementById('notifDot');
  if (d) { d.style.display=cnt>0?'flex':'none'; d.innerText=cnt>9?'9+':cnt; }
}

function openNotifs() {
  const list=document.getElementById('notifList');
  if (!AD.notifications.length) { list.innerHTML='<div style="text-align:center;padding:24px;color:var(--t3);">No notifications yet</div>'; }
  else {
    list.innerHTML=AD.notifications.slice(0,50).map(n=>`
      <div onclick="readNotif(${n.id})" style="padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;${!n.read?'background:rgba(255,183,77,0.06);border-left:3px solid var(--gold);':''}">
        <i class="fas ${n.type==='success'?'fa-check-circle':n.type==='error'?'fa-times-circle':'fa-info-circle'}" style="color:${n.type==='success'?'#4caf50':n.type==='error'?'#ef5350':'#ff9800'};margin-right:8px;"></i>
        ${n.msg}<div style="font-size:10px;color:var(--t3);margin-top:3px;">${n.ts}</div>
      </div>`).join('');
  }
  openModal('mNotif');
}
function readNotif(id){ const n=AD.notifications.find(x=>x.id===id); if(n){n.read=true;save();updateNotifBadge();openNotifs();} }
function clearNotifs(){ AD.notifications=[]; save(); updateNotifBadge(); closeModal('mNotif'); toast('Notifications cleared'); }

// ============================================================
// WEATHER — GPS-based
// ============================================================
async function initWeather() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      async pos => { await fetchWeather(pos.coords.latitude, pos.coords.longitude); },
      async () => { await fetchWeatherByIP(); }, // GPS denied — use IP location
      { timeout: 8000 }
    );
  } else { await fetchWeatherByIP(); }
}

async function fetchWeatherByIP() {
  try {
    // Free IP geolocation — no key needed
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    if (d.latitude && d.longitude) {
      await fetchWeather(d.latitude, d.longitude);
    } else {
      await fetchWeather(24.8607, 67.0011); // Karachi fallback
    }
  } catch(e) {
    await fetchWeather(24.8607, 67.0011); // Karachi fallback
  }
}
async function fetchWeather(lat, lon) {
  try {
    const [wRes, gRes] = await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation,weathercode&wind_speed_unit=kmh`),
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
    ]);
    const w = await wRes.json();
    const g = await gRes.json();
    const c = w.current;
    const temp = Math.round(c.temperature_2m);
    const wind = Math.round(c.wind_speed_10m);
    const rain = c.precipitation||0;
    const hum  = c.relative_humidity_2m||0;
    const wc   = c.weathercode||0;
    const city = g.address?.city||g.address?.town||g.address?.village||g.address?.county||'Pakistan';
    const icons = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',73:'❄️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',99:'⛈️'};
    const icon = icons[wc]||(rain>0?'🌧️':wind>20?'💨':temp>38?'🔥':'☀️');
    let advice='Ideal Spray', ac='spray-good';
    if (wind>20||rain>5){advice='Not Safe';ac='spray-bad';}
    else if (wind>15||hum>85){advice='Caution';ac='spray-warn';}
    document.getElementById('wIcon').innerText=icon;
    document.getElementById('wTemp').innerText=temp+'°C';
    document.getElementById('wLoc').innerText=city;
    document.getElementById('wAdvice').innerText=advice;
    document.getElementById('wAdvice').className=`spray-tag ${ac}`;
    const ww=document.getElementById('wWind'); if(ww) ww.innerText=`💨 ${wind} km/h`;
    const wh=document.getElementById('wHum');  if(wh) wh.innerText=`💧 ${hum}%`;
    const wr=document.getElementById('wRain'); if(wr) wr.innerText=`🌧 ${rain}mm`;
    document.getElementById('weatherPill').title=`${city} — ${temp}°C | Wind: ${wind} km/h | Humidity: ${hum}% | Rain: ${rain}mm | ${advice}`;
  } catch(e){ document.getElementById('wTemp').innerText='--°C'; document.getElementById('wLoc').innerText='Weather unavailable'; }
}

// ============================================================
// AUTH
// ============================================================
function doLogin() {
  const e=document.getElementById('lEmail').value.trim().toLowerCase();
  const p=document.getElementById('lPwd').value;
  const btn=document.getElementById('lBtn');
  const err=document.getElementById('lErr');
  if (!e||!p){ showErr('Please enter email and password.'); return; }
  btn.disabled=true; btn.textContent='Signing in...';

  const attempt=()=>{
    const u=AD.users.find(u=>u.email.toLowerCase()===e && u.password===p);
    btn.disabled=false; btn.textContent='Access Dashboard';
    if (!u){ showErr('Invalid email or password. Please try again.'); return; }
    if (u.status==='fired'){ showErr('Your employment has been terminated. Contact HR.'); return; }
    if (u.status==='inactive'||!u.active){ showErr('Account deactivated. Contact your manager.'); return; }
    loginSuccess(u);
  };

  // Pull latest users from Firebase first (so new employees always work)
  if (window.firebaseReady && window.FB) {
    window.FB.get(window.FB.ref(window.FB.db,'users')).then(snap=>{
      const data=snap.val();
      if (data) Object.values(data).forEach(fu=>{
        const i=AD.users.findIndex(u=>u.id===fu.id);
        if (i===-1) AD.users.push(fu); else AD.users[i]=fu;
      });
      localStorage.setItem('asp_data',JSON.stringify(AD));
      attempt();
    }).catch(attempt);
  } else { attempt(); }
}
function showErr(msg){ const e=document.getElementById('lErr'); e.style.display='block'; e.innerHTML=`<i class="fas fa-exclamation-circle"></i> ${msg}`; setTimeout(()=>e.style.display='none',5000); }

function loginSuccess(u) {
  CU=u; window.CU=u;
  localStorage.setItem('asp_session', JSON.stringify({id:u.id}));
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('roleTag').innerText=u.designation||u.role;
  document.getElementById('uName').innerText=u.name.split(' ')[0];
  buildNav(); showPage('dashboard'); updateNotifBadge();
  toast(`Welcome back, ${u.name}! 👋`);
  initWeather();
}

function checkSession() {
  const s=localStorage.getItem('asp_session');
  if (!s) return false;
  try {
    const {id}=JSON.parse(s);
    const u=AD.users.find(u=>u.id===id&&u.active&&u.status==='active');
    if (!u) return false;
    loginSuccess(u); return true;
  } catch(e){ return false; }
}

function logout() {
  localStorage.removeItem('asp_session');
  CU=null; window.CU=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('mainApp').style.display='none';
}

// NAVIGATION
// ============================================================
const ROLE_ACCESS = {
  manager: ['all'],
  pilot:   ['dashboard','bookings','invoices','settings'],
  agri:    ['dashboard','bookings','settings']
};
function canAccess(page) {
  if (!CU) return false;
  if (CU.role==='manager') return true;
  // Use saved access array, fall back to role defaults
  const access = (CU.access && CU.access.length>0) ? CU.access : (ROLE_ACCESS[CU.role]||['dashboard']);
  if (access.includes('all')) return true;
  return access.includes(page);
}

function buildNav() {
  const pages = [
    {key:'dashboard',icon:'fa-chart-line',label:'Dashboard'},
    {key:'bookings',icon:'fa-calendar-check',label:'Bookings', badge:'bkBadge', roles:['manager','pilot','agri']},
    {key:'invoices',icon:'fa-receipt',label:'Invoices', badge:'invBadge', roles:['manager','pilot']},
    {key:'expenses',icon:'fa-coins',label:'Expenses', roles:['manager']},
    {key:'investments',icon:'fa-chart-pie',label:'Investments', roles:['manager']},
    {key:'drones',icon:'fa-helicopter',label:'Drones', roles:['manager']},
    {key:'generators',icon:'fa-bolt',label:'Generators', roles:['manager']},
    {key:'employees',icon:'fa-users',label:'Employees', roles:['manager']},
    {key:'settings',icon:'fa-cog',label:'Settings'},
  ];
  let h='';
  pages.forEach(pg=>{
    if (pg.roles && !pg.roles.includes(CU.role)) return;
    if (!canAccess(pg.key)&&CU.role!=='manager') return;
    if (pg.key==='bookings'&&CU.role==='agri') {
      h+=`<div class="nav-sec">FIELD WORK</div>`;
    } else if (pg.key==='expenses') {
      h+=`<div class="nav-sec">FINANCE</div>`;
    } else if (pg.key==='drones') {
      h+=`<div class="nav-sec">ASSETS</div>`;
    } else if (pg.key==='employees') {
      h+=`<div class="nav-sec">TEAM</div>`;
    } else if (pg.key==='settings') {
      h+=`<div class="nav-sec">SYSTEM</div>`;
    } else if (pg.key==='dashboard') {
      h+=`<div class="nav-sec">MAIN</div>`;
    }
    h+=`<div class="nav-item" onclick="showPage('${pg.key}');closeSidebar();" id="nav_${pg.key}">
      <i class="fas ${pg.icon}"></i> ${pg.label}
      ${pg.badge?`<span class="nav-badge" id="${pg.badge}">0</span>`:''}
    </div>`;
  });
  h+=`<div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>`;
  document.getElementById('sideNav').innerHTML=h;
  updateBadges();
}

function updateBadges() {
  const bk=document.getElementById('bkBadge');
  const inv=document.getElementById('invBadge');
  if (bk) bk.innerText=AD.bookings.filter(b=>b.status==='pending').length;
  if (inv) inv.innerText=AD.invoices.filter(i=>i.status==='pending').length;
}

const PAGE_TITLES={dashboard:'📊 Dashboard',bookings:'📋 Bookings',invoices:'💰 Invoices',expenses:'📉 Expenses',investments:'📈 Investments',drones:'🚁 Drones',generators:'⚡ Generators',employees:'👥 Employees',settings:'⚙️ Settings'};

function showPage(page) {
  window._page=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const ni=document.getElementById('nav_'+page);
  if (ni) ni.classList.add('active');
  document.getElementById('pageTitle').innerHTML=PAGE_TITLES[page]||page;
  closeSidebar();
  const map={dashboard:renderDash,bookings:renderBookings,invoices:renderInvoices,
             expenses:renderExpenses,investments:renderInvestments,drones:renderDrones,
             generators:renderGenerators,employees:renderEmployees,settings:renderSettings};
  if (map[page]) map[page]();
}

// Firebase listeners refresh current page if user is on that page
window._refreshPage = function(page) {
  if (window._page === page) {
    const map = {bookings:renderBookings, invoices:renderInvoices, dashboard:renderDash};
    if (map[page]) map[page]();
  }
};

  } else if (CU.role === 'pilot') {

      String(b.createdBy).trim() === String(CU.id).trim()
    );
  } else {
    // Agri officer sees bookings they created
    myBookings = AD.bookings.filter(b => String(b.createdBy).trim() === String(CU.id).trim());

  const pilots = AD.users.filter(u => u.role === 'pilot' && u.status === 'active');

    <div class="card">
      <div class="card-title">➕ New Booking</div>
      <div class="g2">
        <div><label>Farmer Name *</label><input id="bkFarmer" placeholder="Enter farmer name"></div>
        <div><label>Contact</label><input id="bkContact" placeholder="+92 300 0000000"></div>
        <div><label>Acres *</label><input type="number" id="bkAcres" step="0.1" placeholder="0" oninput="calcBK()"></div>

        <div><label>Final Price / Acre</label><input id="bkFinalPrice" readonly placeholder="Auto"></div>
        <div><label>Total Amount</label><input id="bkTotal" readonly placeholder="Auto" style="color:var(--gold);font-weight:700;"></div>

        <div class="card-title" style="margin:0;padding:0;border:none;">${CU.role === 'manager' ? '📋 All Bookings' : '📋 My Bookings'}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <input id="bkSearch" placeholder="🔍 Search farmer / ID..." oninput="filterBK()" style="width:180px;padding:7px 12px;border-radius:30px;">
          <select id="bkStatusF" onchange="filterBK()" style="width:130px;padding:7px 12px;border-radius:30px;">
            <option value="">All Status</option><option value="pending">Pending</option><option value="completed">Completed</option><option value="invoiced">Invoiced</option>

      <div class="tbl-wrap"><table>

function calcBK() {
  const a = parseFloat(document.getElementById('bkAcres')?.value) || 0;
  const p = parseFloat(document.getElementById('bkPrice')?.value) || 0;
  const d = parseFloat(document.getElementById('bkDiscount')?.value) || 0;
  const f = Math.max(0, p - d);
  const t = a * f;
  const fe = document.getElementById('bkFinalPrice'); if (fe) fe.value = fc(f);
  const te = document.getElementById('bkTotal'); if (te) te.value = fc(t);
}

function renderBKList(list) {
  const tbody = document.getElementById('bookingsList');
  if (!tbody) return;
  if (!list || !list.length) {
    tbody.innerHTML = `<tr><td colspan="11" style="text-align:center;padding:24px;color:var(--t3);">No bookings found</td></tr>`;
    return;
  }
  const sorted = [...list].sort((a, b) => b.id.localeCompare(a.id));
  tbody.innerHTML = sorted.map((b, i) => `<tr>
    <td style="color:var(--t3);font-size:11px;">${i + 1}</td>
    <td><strong>${b.id}</strong></td>
    <td><div>${b.farmer}</div><small style="color:var(--t3);">${b.contact || ''}</small></td>
    <td>${b.acres}</td>
    <td style="color:var(--t2);">${fc(b.finalPrice || 0)}</td>
    <td style="color:var(--gold);font-weight:700;">${fc(b.total || 0)}</td>
    <td><span class="badge b-agri" style="font-size:9px;">${b.createdByName || '—'}</span></td>
    <td><span class="badge b-pilot" style="font-size:9px;">${b.assignedToName || '—'}</span></td>
    <td style="font-size:11px;color:var(--t3);">${b.date || '—'}</td>
    <td><span class="badge b-${b.status}">${b.status}</span></td>
    <td style="display:flex;gap:4px;flex-wrap:wrap;">
      ${b.status === 'pending' && (CU.role === 'pilot' || CU.role === 'manager') ? `<button class="btn btn-success btn-xs" onclick="completeBooking('${b.id}')"><i class="fas fa-check"></i> Done</button>` : ''}
      ${b.status !== 'invoiced' && CU.role !== 'agri' ? `<button class="btn btn-outline btn-xs" onclick="goInvoice('${b.id}')"><i class="fas fa-receipt"></i> Invoice</button>` : ''}
      ${CU.role === 'manager' ? `<button class="btn btn-danger btn-xs" onclick="delBK('${b.id}')"><i class="fas fa-trash"></i></button>` : ''}
    </td>
  </tr>`).join('');
}

function filterBK() {
  const q = (document.getElementById('bkSearch')?.value || '').toLowerCase();
  const sf = document.getElementById('bkStatusF')?.value || '';
  let list;
  if (CU.role === 'manager') {
    list = AD.bookings;
  } else if (CU.role === 'pilot') {
    list = AD.bookings.filter(b =>
      String(b.assignedTo).trim() === String(CU.id).trim() ||
      String(b.createdBy).trim() === String(CU.id).trim()
    );
  } else {
    list = AD.bookings.filter(b => String(b.createdBy).trim() === String(CU.id).trim());
  }
  list = list.filter(b => {
    const ms = !q || b.farmer.toLowerCase().includes(q) || b.id.toLowerCase().includes(q) || (b.location || '').toLowerCase().includes(q);
    const ss = !sf || b.status === sf;
    return ms && ss;
  });
  renderBKList(list);
}

function createBooking() {
  const farmer = (document.getElementById('bkFarmer')?.value || '').trim();
  const acres = parseFloat(document.getElementById('bkAcres')?.value) || 0;
  if (!farmer) { toast('Farmer name is required', 'error'); return; }
  if (acres <= 0) { toast('Acres must be greater than 0', 'error'); return; }
  const price = parseFloat(document.getElementById('bkPrice')?.value) || 1500;
  const discount = parseFloat(document.getElementById('bkDiscount')?.value) || 0;
  const finalPrice = Math.max(0, price - discount);
  const total = parseFloat((acres * finalPrice).toFixed(2));
  const pilotId = document.getElementById('bkPilot')?.value || '';
  const pilotUser = pilotId ? AD.users.find(u => u.id === pilotId) : null;
  const booking = {
    id: bkNum(), farmer, acres, price, discount, finalPrice, total,
    contact: document.getElementById('bkContact')?.value || '',
    location: document.getElementById('bkLocation')?.value || '',
    crop: document.getElementById('bkCrop')?.value || '',
    sprayType: document.getElementById('bkSprayType')?.value || '',
    product: document.getElementById('bkProduct')?.value || '',
    date: document.getElementById('bkDate')?.value || today(),
    notes: document.getElementById('bkNotes')?.value || '',
    assignedTo: pilotId, assignedToName: pilotUser?.name || '',
    status: 'pending',
    createdBy: CU.id, createdByName: CU.name,
    createdAt: Date.now()
  };
  if (!AD.bookings) AD.bookings = [];
  AD.bookings.push(booking);
  save();
  if (window.firebaseReady && window.FB) {
    window.FB.update(window.FB.ref(window.FB.db, `bookings/${booking.id}`), booking).catch(() => {});
  }
  if (pilotId) addNotif(`🆕 Booking ${booking.id} assigned to you — ${farmer}`, 'info', pilotId);
  addNotif(`📋 New booking ${booking.id} by ${CU.name}`, 'info', 'manager');
  toast(`✅ Booking ${booking.id} created!`);
  // Clear form
  ['bkFarmer','bkContact','bkAcres','bkLocation','bkCrop','bkProduct','bkNotes'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  const pd = document.getElementById('bkPrice'); if (pd) pd.value = '1500';
  const dd = document.getElementById('bkDiscount'); if (dd) dd.value = '0';
  const ps = document.getElementById('bkPilot'); if (ps) ps.value = '';
  calcBK();
  renderBKList(CU.role === 'manager' ? AD.bookings : AD.bookings.filter(b => b.assignedTo === CU.id || b.createdBy === CU.id));
  updateBadges();
}

function completeBooking(id) {
  const bk = AD.bookings.find(b => b.id === id);
  if (!bk) { toast('Booking not found', 'error'); return; }
  bk.status = 'completed';
  bk.completedBy = CU.id;
  bk.completedByName = CU.name;
  bk.completedAt = Date.now();
  save();
  if (window.firebaseReady && window.FB) {
    window.FB.update(window.FB.ref(window.FB.db, `bookings/${id}`), { status: 'completed', completedBy: CU.id, completedByName: CU.name, completedAt: Date.now() }).catch(() => {});
  }
  addNotif(`✅ Booking ${id} completed by ${CU.name}`, 'success', 'manager');
  addNotif(`✅ Booking ${id} completed by ${CU.name}`, 'success', bk.createdBy);
  toast(`Booking ${id} marked as completed`);
  renderBookings(); updateBadges();
}

function delBK(id) {

  AD.bookings = AD.bookings.filter(b => b.id !== id);

function fillInvFromBK(bid) {
  if (!bid) return;
  const bk=AD.bookings.find(b=>b.id===bid);
  if (!bk){ toast('Booking not found','error'); return; }
  const sv=(id,v)=>{ const el=document.getElementById(id); if(el) el.value=v||''; };
  sv('invFarmer',bk.farmer); sv('invContact',bk.contact); sv('invAcres',bk.acres);
  sv('invLoc',bk.location); sv('invCrop',bk.crop); sv('invProduct',bk.product);
  sv('invPrice',bk.price||1500); sv('invDisc',bk.discount||0); sv('invBKId',bk.id);
  const ss=document.getElementById('invSpray');
  if (ss&&bk.sprayType) for(let o of ss.options){if(o.text===bk.sprayType){ss.value=o.value;break;}}
  const sel=document.getElementById('invBKSel'); if(sel) sel.value=bid;
  calcINV(); toast(`✅ Booking ${bk.id} loaded — ${bk.farmer}`);
}

function toggleTrx(){ const m=document.getElementById('invPayM')?.value; const g=document.getElementById('trxGrp'); if(g) g.style.display=m==='cash'?'none':'block'; }
function calcINV(){
  const a=parseFloat(document.getElementById('invAcres')?.value)||0;
  const p=parseFloat(document.getElementById('invPrice')?.value)||0;
  const d=parseFloat(document.getElementById('invDisc')?.value)||0;
  const f=Math.max(0,p-d); const t=a*f;
  const fe=document.getElementById('invFinal'); if(fe) fe.value=fc(f);
  const te=document.getElementById('invTot'); if(te) te.value=fc(t);
  calcChange();
}
function calcChange(){
  const tot=parseFloat((document.getElementById('invTot')?.value||'').replace(/[^\d.]/g,''))||0;
  const paid=parseFloat(document.getElementById('invPaid')?.value)||0;
  const ch=document.getElementById('invChange');
  if(ch) ch.value=paid>=tot?fc(paid-tot):`Need ${fc(tot-paid)} more`;
}

function createInvoice(){
  AD = window.AD;
  const farmer=(document.getElementById('invFarmer')?.value||'').trim();
  const acres=parseFloat(document.getElementById('invAcres')?.value)||0;
  const product=(document.getElementById('invProduct')?.value||'').trim();
  if (!farmer){ toast('Farmer name is required','error'); return; }
  if (acres<=0){ toast('Acres must be greater than 0','error'); return; }
  if (!product){ toast('Product / chemical name is required','error'); return; }
  const price=parseFloat(document.getElementById('invPrice')?.value)||1500;
  const disc=parseFloat(document.getElementById('invDisc')?.value)||0;
  const finalPrice=Math.max(0,price-disc);
  const total=parseFloat((acres*finalPrice).toFixed(2));
  // Default paid = total if field is empty or zero
  const paidRaw=parseFloat(document.getElementById('invPaid')?.value)||0;
  const paid=paidRaw>0?paidRaw:total;
  const change=parseFloat((paid-total).toFixed(2));
  const bkId=(document.getElementById('invBKId')?.value||'').trim()||null;
  const inv={
    id:invNum(), farmer, acres, total, paid, price, discount:disc, finalPrice,
    product, contact:document.getElementById('invContact')?.value||'',
    location:document.getElementById('invLoc')?.value||'',
    crop:document.getElementById('invCrop')?.value||'',
    sprayType:document.getElementById('invSpray')?.value||'',
    change:change<0?0:change, bookingId:bkId,
    paymentMethod:document.getElementById('invPayM')?.value||'cash',
    transactionId:document.getElementById('invTrx')?.value||'',
    date:today(), status:'pending',
    createdBy:CU.id, createdByName:CU.name,
    createdAt:Date.now()
  };
  if (!AD.invoices) AD.invoices=[];
  AD.invoices.push(inv);
  if (bkId){ const bk=AD.bookings?.find(b=>b.id===bkId); if(bk) bk.status='invoiced'; }
  save();
  if (window.firebaseReady&&window.FB){
    window.FB.update(window.FB.ref(window.FB.db,`invoices/${inv.id}`),inv).catch(()=>{});
    if (bkId) window.FB.update(window.FB.ref(window.FB.db,`bookings/${bkId}`),{status:'invoiced'}).catch(()=>{});
  }
  addNotif(`📄 Invoice ${inv.id} submitted by ${CU.name} — ${fc(total)}`,'info','manager');
  toast(`✅ Invoice ${inv.id} submitted!`);
  renderInvoices(); updateBadges();
}

function approveInv(iid,ok){
  const inv=AD.invoices.find(i=>i.id===iid);
  if (!inv) return;
  inv.status=ok?'approved':'rejected';
  // AD.recovered is now always computed live — no need to mutate it
  save();
  if (window.firebaseReady && window.FB) window.FB.update(window.FB.ref(window.FB.db,`invoices/${iid}`),{status:inv.status}).catch(()=>{});
  const msg=ok?`✅ Invoice ${iid} approved by Manager!`:`❌ Invoice ${iid} was rejected`;
  addNotif(msg, ok?'success':'error', inv.createdBy);
  toast(ok?'Invoice approved!':'Invoice rejected'); closeModal('mApprove');
  renderInvoices(); renderDash(); updateBadges();
}
function delInv(id) {
  const inv = AD.invoices.find(i => i.id === id);
  if (!inv) { toast('Invoice not found','error'); return; }
  if (!confirm(`Delete invoice ${id}?\n\nThis will permanently remove:\n• Revenue: ${fc(inv.total)}\n• Acres sprayed: ${inv.acres} ac\n• Linked booking restored\n\nThis cannot be undone.`)) return;
  // Restore linked booking
  if (inv.bookingId) {
    const bk = AD.bookings.find(b => b.id === inv.bookingId);
    if (bk && bk.status === 'invoiced') {
      bk.status = bk.completedAt ? 'completed' : 'pending';
      if (window.firebaseReady && window.FB)
        window.FB.update(window.FB.ref(window.FB.db, `bookings/${bk.id}`), { status: bk.status }).catch(() => {});
    }
  }
  // Track deleted so Firebase never re-adds
  if (!AD.deletedINVIds) AD.deletedINVIds = [];
  if (!AD.deletedINVIds.includes(id)) AD.deletedINVIds.push(id);
  // Remove from local array
  AD.invoices = AD.invoices.filter(i => i.id !== id);
  AD.recovered = 0;
  // Save locally first
  localStorage.setItem('asp_data', JSON.stringify(AD));
  // Write entire invoices node to Firebase atomically — either remaining records or null
  if (window.firebaseReady && window.FB) {
    const {db, ref, set} = window.FB;
    const remaining = AD.invoices.length
      ? Object.fromEntries(AD.invoices.map(i => [i.id, i]))
      : null; // null wipes the entire Firebase invoices node
    set(ref(db, 'invoices'), remaining).catch(() => {});
  }
  // Refresh all pages immediately
  renderInvoices();
  renderDash();
  updateBadges();
  toast(`✅ Invoice ${id} deleted — Revenue & acres updated`);
}

async function savePDF(){

function delExp(id){ if(!confirm('Delete expense?')) return; AD.expenses=AD.expenses.filter(e=>e.id!==id); save(); renderExpenses(); }
function processSalary(){
  const actives=AD.users.filter(u=>u.active&&u.status==='active'&&(u.salary||0)>0);
  if (!actives.length){ toast('No active employees with salary set','error'); return; }
  let tot=0;
  actives.forEach(u=>{
    AD.expenses.push({id:Date.now()+Math.random(),date:today(),category:'Salary',employeeId:u.id,employeeName:u.name,employeeRole:u.designation||u.role,amount:u.salary||0,description:`Salary: ${u.name}`});
    tot+=u.salary||0;
  });
  save(); renderExpenses(); toast(`✅ Salary processed: ${fc(tot)} for ${actives.length} employees`);
}

function chkTrxInv(){ const m=document.getElementById('invPM')?.value; const g=document.getElementById('invTrxGrp'); if(g) g.style.display=m==='cash'?'none':'block'; }
function renderInvestmentsList(){
  const flt=document.getElementById('invFlt')?.value||'';
  let list=flt?AD.investments.filter(i=>i.type===flt):AD.investments;
  list=[...list].reverse();
  const t=document.getElementById('invTbl'); if(!t) return;
  t.innerHTML=list.length===0?`<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--t3);">No transactions</td></tr>`:
    list.map((i,idx)=>`<tr>
      <td style="color:var(--t3);font-size:11px;">${list.length-idx}</td>
      <td style="font-size:11px;">${i.date}</td>
      <td><strong>${i.partner}</strong></td>

      <td style="font-size:11px;color:#00bcd4;font-weight:600;">${i.trxId||'—'}</td>

function addInvestment(){
  const p=document.getElementById('invP')?.value.trim();
  const amt=parseFloat(document.getElementById('invAm')?.value)||0;
  if (!p||amt<=0){ toast('Partner name and amount required','error'); return; }
  const type=document.getElementById('invTy').value;
  AD.investments.push({id:Date.now()+Math.random(),partner:p,amount:amt,type,date:document.getElementById('invDt').value,paymentMethod:document.getElementById('invPM').value,trxId:document.getElementById('invTrxI')?.value.trim()||'',notes:document.getElementById('invNt')?.value.trim()||''});
  if (type==='investment') AD.invest+=amt;
  else AD.recovered+=amt;
  save(); renderInvestments(); toast(`✅ ${type==='investment'?'Investment':'Recovery'} of ${fc(amt)} recorded`);
}
function delInv2(id){ if(!confirm('Delete transaction?')) return; const r=AD.investments.find(i=>i.id===id); if(r){if(r.type==='investment')AD.invest-=r.amount;else AD.recovered-=r.amount;} AD.investments=AD.investments.filter(i=>i.id!==id); save(); renderInvestments(); }

// Designation → System Role mapping
const DES_ROLE = {
  'Manager':'manager','Admin / HR':'manager','Accountant':'manager','Supervisor':'manager',
  'Drone Pilot':'pilot',
  'Agri Officer':'agri','Agronomist':'agri','Helper / Farm Laborer':'agri',
  'Driver':'agri','Technician':'agri','Warehouse Manager':'agri','Other':'agri'
};
function autoRole(){
  const des=document.getElementById('eDes')?.value||'';
  const role=DES_ROLE[des]||'agri';
  // Auto-tick access checkboxes based on role
  const defaults = ROLE_ACCESS[role]||['dashboard'];
  document.querySelectorAll('#accessChecks input[type=checkbox]').forEach(cb=>{
    cb.checked = defaults.includes('all') || defaults.includes(cb.value);
  });
}

function addEmployee(){
  const name=document.getElementById('eName').value.trim();
  const email=document.getElementById('eEmail').value.trim().toLowerCase();
  const pwd=document.getElementById('ePwd').value.trim();
  const designation=document.getElementById('eDes').value;
  const role = DES_ROLE[designation] || 'agri';
  const salary=parseFloat(document.getElementById('eSal').value)||0;
  const phone=document.getElementById('ePhone').value.trim();
  const cnic=document.getElementById('eCnic').value.trim();
  if (!name){toast('Name required','error');return;}
  if (!email||!email.includes('@')){toast('Valid email required','error');return;}
  if (!pwd||pwd.length<4){toast('Password must be at least 4 characters','error');return;}
  if (AD.users.find(u=>u.email.toLowerCase()===email)){toast('Email already registered','error');return;}
  // Collect checked access; if none ticked, use role defaults
  let access=[];
  document.querySelectorAll('#accessChecks input[type=checkbox]:checked').forEach(cb=>{ if(!access.includes(cb.value)) access.push(cb.value); });
  if (access.length===0) access = [...(ROLE_ACCESS[role]||['dashboard','bookings'])];
  // Always include dashboard
  if (!access.includes('dashboard')&&!access.includes('all')) access.unshift('dashboard');
  const newUser={
    id:'u_'+Date.now(), email, password:pwd, role, designation, name,
    active:true, joinDate:document.getElementById('eJoin').value||today(),
    salary, phone, cnic, status:'active', access
  };
  AD.users.push(newUser); save();
  if (window.firebaseReady && window.FB) {
    window.FB.update(window.FB.ref(window.FB.db,`users/${newUser.id}`),newUser)
      .then(()=>toast(`✅ ${name} added & synced — ${email}`))
      .catch(()=>toast(`✅ ${name} added (will sync when online)`));
  } else { toast(`✅ ${name} added — ${email}`); }
  renderEmployees();
  ['eName','eEmail','ePwd','eSal','ePhone','eCnic'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}

function editSalary(uid){
  const u=AD.users.find(u=>u.id===uid); if(!u) return;
  const ns=prompt(`New salary for ${u.name} (current: ₨${(u.salary||0).toLocaleString()}):`,u.salary||0);
  if (ns===null) return;
  const p=parseFloat(ns);
  if (isNaN(p)||p<0){toast('Invalid amount','error');return;}
  u.salary=p; save(); renderEmployees(); toast(`✅ Salary updated: ${fc(p)}`);
}
function setEmpStatus(uid,st){ const u=AD.users.find(u=>u.id===uid); if(u){u.status=st;u.active=st==='active';if(st==='active'){delete u.firedDate;delete u.firedBy;}save();renderEmployees();toast(`${u.name} → ${st}`);} }
function delEmp(uid){
  if (!confirm('Delete this employee permanently?')) return;
  const isDefault = DEF_USERS.some(du=>du.id===uid);
  if (isDefault) {
    if (!AD.deletedDefaults) AD.deletedDefaults=[];
    if (!AD.deletedDefaults.includes(uid)) AD.deletedDefaults.push(uid);
  }
  AD.users=AD.users.filter(u=>u.id!==uid);
  save(); renderEmployees(); toast('Employee deleted');
}

function fireEmployee(uid){
  const u=AD.users.find(u=>u.id===uid); if(!u) return;
  if (uid==='u1'){ toast('Cannot fire the primary manager','error'); return; }
  if (!confirm(`FIRE ${u.name.toUpperCase()}?\n\nThis will immediately:\n• Revoke all login access\n• Mark status as Fired\n• Block all system access\n\nProceed?`)) return;
  u.status='fired'; u.active=false; u.firedDate=today(); u.firedBy=CU.name;
  save();
  if (window.firebaseReady&&window.FB) window.FB.update(window.FB.ref(window.FB.db,`users/${uid}`),{status:'fired',active:false,firedDate:today(),firedBy:CU.name}).catch(()=>{});
  addNotif(`🔥 ${u.name} has been fired by ${CU.name}`,'error','manager');
  toast(`🔥 ${u.name} fired — access revoked immediately`,'error');
  renderEmployees();
}

function exportMonthlyPDF(mode) {
  const month = mode === 'all' ? null : document.getElementById('rptMonth')?.value;
  if (!mode && !month) { toast('Please select a month first', 'error'); return; }

  const label = month
    ? new Date(month+'-01').toLocaleDateString('en-PK',{year:'numeric',month:'long'})
    : 'All Records';

  const bks = month ? AD.bookings.filter(b=>b.date?.startsWith(month)) : AD.bookings;
  const invs = month ? AD.invoices.filter(i=>i.date?.startsWith(month)) : AD.invoices;
  const exps = month ? AD.expenses.filter(e=>e.date?.startsWith(month)) : AD.expenses;

  const totalRev = invs.filter(i=>i.status==='approved').reduce((s,i)=>s+i.total,0);

    .kpis{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;}

    .kpi-lbl{font-size:10px;color:#555;margin-top:2px;}
    table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:11px;}
    th{background:#1a5c2e;color:#fff;padding:7px 8px;text-align:left;}

    tr:nth-child(even) td{background:#f9f9f9;}
    .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
    .pending{background:#fff3e0;color:#e65100;}
    .completed{background:#e8f5e9;color:#2e7d32;}

    .footer{margin-top:30px;text-align:center;font-size:10px;color:#999;border-top:1px solid #eee;padding-top:12px;}

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Report</title><style>${styles}</style></head><body>

      <div class="kpi"><div class="kpi-val">${totalAcres.toLocaleString()}</div><div class="kpi-lbl">Acres Sprayed</div></div>
    </div>

    <h2>📋 Bookings (${bks.length})</h2>
    <table><thead><tr><th>ID</th><th>Date</th><th>Farmer</th><th>Location</th><th>Acres</th><th>Product</th><th>Total</th><th>Created By</th><th>Pilot</th><th>Status</th></tr></thead><tbody>

  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  toast('📄 Report opened — use Print → Save as PDF');
}

function importData(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.bookings && !parsed.users && !parsed.invoices) {
        toast('Invalid backup file — not an AgriSpray export', 'error'); return;
      }
      if (!confirm(`Import backup?\n\nThis will merge:\n• ${(parsed.bookings||[]).length} bookings\n• ${(parsed.invoices||[]).length} invoices\n• ${(parsed.users||[]).length} users\n• ${(parsed.expenses||[]).length} expenses\n\nExisting data will be kept. Duplicates skipped.`)) return;
      // Merge — don't overwrite, add missing records
      ['bookings','invoices','expenses','investments','drones','generators'].forEach(key=>{
        if (!parsed[key]) return;
        if (!AD[key]) AD[key]=[];
        parsed[key].forEach(item=>{
          if (item.id && !AD[key].find(x=>x.id===item.id)) AD[key].push(item);
        });
      });
      // Merge users
      if (parsed.users) {
        parsed.users.forEach(pu=>{
          if (!AD.users.find(u=>u.id===pu.id)) AD.users.push(pu);
        });
      }
      // Restore counters if higher
      if (parsed.nextBK > AD.nextBK) AD.nextBK = parsed.nextBK;
      if (parsed.nextINV > AD.nextINV) AD.nextINV = parsed.nextINV;
      save();
      toast(`✅ Import complete! ${(parsed.bookings||[]).length} bookings, ${(parsed.invoices||[]).length} invoices merged`);
      renderSettings();
    } catch(err) {
      toast('Failed to read backup file — invalid JSON', 'error');
    }
  };
  reader.readAsText(file);
}
function saveSettings(){ AD.company=document.getElementById('sComp').value; AD.waNum=document.getElementById('sWa').value; save(); toast('Settings saved!'); }
function changePwd(){
  const o=document.getElementById('oCp').value,n=document.getElementById('nCp').value,c=document.getElementById('cfCp').value;
  if (o!==CU.password){toast('Current password is incorrect','error');return;}
  if (n!==c){toast('New passwords do not match','error');return;}
  if (n.length<4){toast('Password too short','error');return;}
  CU.password=n; const i=AD.users.findIndex(u=>u.id===CU.id); if(i!==-1) AD.users[i].password=n;
  save(); toast('Password changed successfully!');
}
function exportData(){ const a=document.createElement('a'); a.href='data:application/json,'+encodeURIComponent(JSON.stringify(AD,null,2)); a.download='agrispray_backup_'+today()+'.json'; a.click(); }
function clearAllData(){ if(!confirm('Delete ALL data? This cannot be undone.')){ return; } localStorage.clear(); location.reload(); }
