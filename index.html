<head>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, update, push, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDCXPRlN5CVmfZgpO7_NE2hRCqCr0h5mqY",
  authDomain: "agrispray-pro.firebaseapp.com",
  databaseURL: "https://agrispray-pro-default-rtdb.firebaseio.com",
  projectId: "agrispray-pro",
  storageBucket: "agrispray-pro.firebasestorage.app",
  messagingSenderId: "72689059265",
  appId: "1:72689059265:web:48bd60e10f5f11d199db40",
  measurementId: "G-VPQLX34G7B"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

// Expose Firebase functions to global scope for use in non-module scripts
window.firebaseDB = db;
window.firebaseRef = ref;
window.firebaseSet = set;
window.firebaseUpdate = update;
window.firebaseGet = get;
window.firebaseOnValue = onValue;
window.firebasePush = push;
window.firebaseReady = true;

// Start listening to Firebase after page loads
window.addEventListener('firebaseInit', () => {
  setupFirebaseListeners();
});

function setupFirebaseListeners() {
  if (!window.firebaseDB) return;

  // Listen to bookings in real-time
  const bookingsRef = ref(db, 'bookings');
  onValue(bookingsRef, (snapshot) => {
    const data = snapshot.val();
    if (data && window.appData) {
      const fbBookings = Object.values(data);
      // Merge: keep local + add any new from Firebase not in local
      fbBookings.forEach(fb => {
        const exists = window.appData.bookings.find(b => b.id === fb.id);
        if (!exists) {
          window.appData.bookings.push(fb);
        } else {
          // Update status if changed remotely
          const idx = window.appData.bookings.findIndex(b => b.id === fb.id);
          if (window.appData.bookings[idx].status !== fb.status) {
            window.appData.bookings[idx].status = fb.status;
            // Show notification for status changes
            if (fb.status === 'completed' && window.currentUser) {
              if (window.currentUser.role === 'manager' || window.currentUser.role === 'agri') {
                window.addNotification(`✅ Booking ${fb.id} completed by pilot!`, 'success', null);
                // Refresh current page if on bookings/dashboard
                const pageTitle = document.getElementById('pageTitle')?.innerText || '';
                if (pageTitle.includes('Booking') || pageTitle.includes('Dashboard')) {
                  window.renderDashboard && window.renderDashboard();
                }
              }
            }
          }
        }
      });
      localStorage.setItem('agrispray_data', JSON.stringify(window.appData));
    }
  });

  // Listen to invoices in real-time
  const invoicesRef = ref(db, 'invoices');
  onValue(invoicesRef, (snapshot) => {
    const data = snapshot.val();
    if (data && window.appData) {
      const fbInvoices = Object.values(data);
      fbInvoices.forEach(fb => {
        const exists = window.appData.invoices.find(i => i.id === fb.id);
        if (!exists) {
          window.appData.invoices.push(fb);
          if (window.currentUser?.role === 'manager') {
            window.addNotification(`📄 New invoice ${fb.id} from ${fb.pilotName || 'staff'}`, 'info', null);
          }
        } else {
          const idx = window.appData.invoices.findIndex(i => i.id === fb.id);
          window.appData.invoices[idx] = fb;
        }
      });
      localStorage.setItem('agrispray_data', JSON.stringify(window.appData));
    }
  });

  console.log('✅ Firebase real-time listeners active');
  // Update status badge
  const badge = document.getElementById('firebaseStatus');
  if (badge) { badge.style.background = 'rgba(76,175,80,0.2)'; badge.style.color = '#4caf50'; badge.innerHTML = '🟢 Live Sync'; badge.title = 'Firebase connected - Real-time sync active'; }
}

// Called once main app is ready
window.initFirebaseListeners = setupFirebaseListeners;
</script>

<script>
// ==================== DEFAULT DATA ====================
const DEFAULT_USERS = [
  { id: "u1", email: "manager@agrispray.com", password: "Admin@123", role: "manager", name: "Adnan Ali", active: true, joinDate: "2024-01-01", salary: 150000, status: "active" },
  { id: "u2", email: "pilot@agrispray.com", password: "Pilot@123", role: "pilot", name: "Ahmed Khan", active: true, joinDate: "2024-02-15", salary: 50000, status: "active" },
  { id: "u3", email: "agri@agrispray.com", password: "Agri@123", role: "agri", name: "Aslam Khan", active: true, joinDate: "2024-03-01", salary: 40000, status: "active" }
];

const PRODUCTS = []; // Products entered manually as free text

window.appData = {};
let appData = window.appData;
Object.assign(appData, {
  users: [],
  drones: [
    { id: "d1", name: "DJI Agras T40", status: "active", totalFlights: 0, totalHours: 0 },
    { id: "d2", name: "DJI Agras T20", status: "active", totalFlights: 0, totalHours: 0 }
  ],
  bookings: [],
  invoices: [],
  expenses: [],
  investments: [],
  notifications: [],
  nextBookingNo: 1,
  nextInvoiceNo: 1,
  totalDroneInvestment: 2000000,
  droneRecovered: 0,
  companyName: "AgriSpray Pro",
  whatsappNumber: ""
});
appData = window.appData;

let currentUser = null;
window.currentUser = null;
let currentInvoiceForPrint = null;

function togglePassword() { let i = document.getElementById('loginPassword'), e = event.target; if (i.type === "password") { i.type = "text"; e.classList.replace('fa-eye', 'fa-eye-slash'); } else { i.type = "password"; e.classList.replace('fa-eye-slash', 'fa-eye'); } }
function toast(msg, t = 'success') { let c = document.getElementById('toastContainer'), d = document.createElement('div'); d.className = 'toast'; d.innerHTML = `<i class="fas ${t === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`; c.appendChild(d); setTimeout(() => d.remove(), 3000); }
function formatCurrency(a) { return '₨ ' + (a || 0).toLocaleString(); }
function today() { return new Date().toISOString().slice(0, 10); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function saveData() {
  localStorage.setItem('agrispray_data', JSON.stringify(appData));
  window.appData = appData;
  // Sync to Firebase if ready
  syncToFirebase();
}

function syncToFirebase() {
  if (!window.firebaseReady || !window.firebaseDB) return;
  try {
    const bookingsObj = {};
    appData.bookings.forEach(b => { bookingsObj[b.id] = b; });
    window.firebaseSet(window.firebaseRef(window.firebaseDB, 'bookings'), bookingsObj).catch(e => console.warn('FB bookings:', e));

    const invoicesObj = {};
    appData.invoices.forEach(i => { invoicesObj[i.id] = i; });
    window.firebaseSet(window.firebaseRef(window.firebaseDB, 'invoices'), invoicesObj).catch(e => console.warn('FB invoices:', e));

    // Sync users (without passwords in a real app — here kept for simplicity since rules are open)
    const usersObj = {};
    appData.users.forEach(u => { usersObj[u.id] = u; });
    window.firebaseSet(window.firebaseRef(window.firebaseDB, 'users'), usersObj).catch(e => console.warn('FB users:', e));

    // Sync investments
    const invObj = {};
    appData.investments.forEach(i => { invObj[i.id] = i; });
    window.firebaseSet(window.firebaseRef(window.firebaseDB, 'investments'), invObj).catch(e => console.warn('FB investments:', e));
  } catch (e) { console.warn('Firebase sync error:', e); }
}
function loadData() {
  let saved = localStorage.getItem('agrispray_data');
  if (saved) {
    try {
      let parsed = JSON.parse(saved);
      Object.assign(appData, parsed);
      window.appData = appData;
    } catch (e) { }
  }
  for (let du of DEFAULT_USERS) {
    if (!appData.users.find(u => u.id === du.id)) {
      appData.users.push(du);
    }
  }
  if (!appData.nextBookingNo) appData.nextBookingNo = 1;
  if (!appData.nextInvoiceNo) appData.nextInvoiceNo = 1;
  if (!appData.notifications) appData.notifications = [];
  if (!appData.expenses) appData.expenses = [];
  saveData();
  // Init Firebase listeners once data is loaded
  setTimeout(() => { if (window.initFirebaseListeners) window.initFirebaseListeners(); }, 1000);
}

async function fetchWeather() {
  try {
    let r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.1985&longitude=72.0243&current=temperature_2m,wind_speed_10m,precipitation');
    let d = await r.json();
    let temp = Math.round(d.current.temperature_2m);
    let wind = Math.round(d.current.wind_speed_10m);
    let rain = d.current.precipitation || 0;
    document.getElementById('weatherTemp').innerHTML = temp;
    let advice = "", adviceClass = "good";
    if (wind > 20 || rain > 5) { advice = "⚠️ Not Safe for Spray"; adviceClass = "danger"; }
    else if (wind > 15) { advice = "⚠️ Caution Advised"; adviceClass = "warning"; }
    else { advice = "✅ Ideal Spray Time"; adviceClass = "good"; }
    document.getElementById('sprayAdvice').innerHTML = advice;
    document.getElementById('sprayAdvice').className = `spray-advice ${adviceClass}`;
    let icon = rain > 0 ? "🌧️" : (wind > 15 ? "💨" : (temp > 35 ? "🔥" : "☀️"));
    document.getElementById('weatherIcon').innerHTML = icon;
  } catch (e) { }
}
fetchWeather(); setInterval(fetchWeather, 300000);

// ==================== AUTHENTICATION ====================
function attemptLogin() {
  let e = document.getElementById('loginEmail').value.trim().toLowerCase();
  let p = document.getElementById('loginPassword').value;
  const btn = document.querySelector('.login-card button');
  if (btn) { btn.disabled = true; btn.textContent = 'Signing in...'; }

  function doLogin() {
    let u = appData.users.find(u => u.email.toLowerCase() === e && u.password === p);
    if (btn) { btn.disabled = false; btn.textContent = 'Access Dashboard'; }
    if (u && !u.active) {
      showLoginError('Your account is inactive. Contact your manager.');
      return;
    }
    if (u && u.status === 'inactive') {
      showLoginError('Your account has been deactivated. Contact your manager.');
      return;
    }
    if (u) {
      currentUser = u;
      window.currentUser = u;
      localStorage.setItem('agrispray_session', JSON.stringify({ id: u.id, role: u.role, name: u.name }));
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      document.getElementById('userRoleBadge').innerHTML = u.role === 'manager' ? '👑 Manager' : (u.role === 'pilot' ? '✈️ Pilot' : '🌾 Agri Officer');
      document.getElementById('userNameDisplay').innerHTML = u.name.split(' ')[0];
      buildSidebar();
      showPage('dashboard');
      updateNotificationBadge();
      toast(`Welcome back, ${u.name}!`);
    } else {
      showLoginError('Invalid email or password. Please try again.');
    }
  }

  // Pull latest users from Firebase first so new accounts show up immediately
  if (window.firebaseReady && window.firebaseDB) {
    window.firebaseGet(window.firebaseRef(window.firebaseDB, 'users')).then(snapshot => {
      const fbUsers = snapshot.val();
      if (fbUsers) {
        Object.values(fbUsers).forEach(fu => {
          const idx = appData.users.findIndex(u => u.id === fu.id);
          if (idx === -1) appData.users.push(fu);
          else appData.users[idx] = fu; // always use Firebase version
        });
        localStorage.setItem('agrispray_data', JSON.stringify(appData));
      }
      doLogin();
    }).catch(() => doLogin()); // if Firebase fails, try local
  } else {
    doLogin();
  }
}

  let el = document.getElementById('loginError');
  el.style.display = 'block';
  el.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${msg}`;

function deleteBookingItem(id) { if (confirm('Delete this booking?')) { appData.bookings = appData.bookings.filter(b => b.id !== id); saveData(); renderBookings(); toast('Booking deleted'); } }
function calcBookingTotal() { let a = parseFloat(document.getElementById('bkAcres').value) || 0, p = parseFloat(document.getElementById('bkPrice').value) || 0, d = parseFloat(document.getElementById('bkDiscount').value) || 0, f = Math.max(0, p - d), t = a * f; document.getElementById('bkFinalPrice').value = formatCurrency(f); document.getElementById('bkTotal').value = formatCurrency(t); }
function createBooking() {
  let acres = parseFloat(document.getElementById('bkAcres').value) || 0, price = parseFloat(document.getElementById('bkPrice').value) || 0, discount = parseFloat(document.getElementById('bkDiscount').value) || 0, finalPrice = Math.max(0, price - discount), total = acres * finalPrice, farmer = document.getElementById('bkFarmer').value;
  if (!farmer || acres <= 0) { toast('Enter farmer name and acres', 'error'); return; }
  let booking = { id: getBookingNumber(), farmer, contact: document.getElementById('bkContact').value, acres, location: document.getElementById('bkLocation').value, crop: document.getElementById('bkCrop').value, sprayType: document.getElementById('bkSprayType').value, product: document.getElementById('bkProduct').value, price, discount, finalPrice, total, date: document.getElementById('bkDate').value, assignedTo: document.getElementById('bkPilot').value, assignedToName: appData.users.find(u => u.id === document.getElementById('bkPilot').value)?.name, status: 'pending', createdBy: currentUser.id, createdByName: currentUser.name };
  appData.bookings.push(booking);
  saveData();
  // Push to Firebase immediately for real-time update
  if (window.firebaseReady && window.firebaseDB) {
    window.firebaseUpdate(window.firebaseRef(window.firebaseDB, `bookings/${booking.id}`), booking)
      .catch(e => console.warn('Firebase booking push failed:', e));
  }
  addNotification(`New booking ${booking.id} created for ${booking.farmer}`, 'info', 'manager');
  addNotification(`New booking ${booking.id} assigned to you`, 'info', 'pilot');
  renderBookings();
  toast(`Booking ${booking.id} created`);
  document.getElementById('bkFarmer').value = '';
  document.getElementById('bkAcres').value = '';
  calcBookingTotal();
}
let _pendingBookingLoad = null;
function loadBookingToInvoice(bid) {
  let b = appData.bookings.find(bk => bk.id === bid);
  if (!b) { toast('Booking not found', 'error'); return; }
  _pendingBookingLoad = b;
  showPage('invoices');
  // Fill fields after renderInvoices() has built the DOM
  setTimeout(() => {
    if (!_pendingBookingLoad) return;
    let bk = _pendingBookingLoad;
    _pendingBookingLoad = null;
    let set = (id, val) => { let el = document.getElementById(id); if (el) el.value = val || ''; };
    set('invFarmer', bk.farmer);
    set('invContact', bk.contact);
    set('invAcres', bk.acres);
    set('invLocation', bk.location);
    set('invCrop', bk.crop);
    set('invProduct', bk.product);
    set('invPrice', bk.price || 1500);
    set('invDiscount', bk.discount || 0);
    set('invBookingId', bk.id);
    // Set spray type select
    let stSel = document.getElementById('invSprayType');
    if (stSel && bk.sprayType) {
      for (let opt of stSel.options) { if (opt.value === bk.sprayType || opt.text === bk.sprayType) { stSel.value = opt.value; break; } }
    }
    // Highlight the booking in the dropdown
    let sel = document.getElementById('invBookingSelect');
    if (sel) sel.value = bk.id;

    toast(`✅ Booking ${bk.id} loaded — ${bk.farmer}`);

}

function renderInvoices() {
  let myInvoices = currentUser.role === 'manager' ? appData.invoices : appData.invoices.filter(i => i.pilotId === currentUser.id || i.createdBy === currentUser.id);
  // Filter bookings available for invoicing per role
  let availableBookings;
  if (currentUser.role === 'agri') {
    availableBookings = appData.bookings.filter(b => b.createdBy === currentUser.id && (b.status === 'pending' || b.status === 'completed'));
  } else if (currentUser.role === 'pilot') {
    availableBookings = appData.bookings.filter(b => b.assignedTo === currentUser.id && (b.status === 'pending' || b.status === 'completed'));
  } else {

function calculateInvoiceTotal() { let a = parseFloat(document.getElementById('invAcres').value) || 0, p = parseFloat(document.getElementById('invPrice').value) || 0, d = parseFloat(document.getElementById('invDiscount').value) || 0, f = Math.max(0, p - d), t = a * f; document.getElementById('invFinalPrice').value = formatCurrency(f); document.getElementById('invTotal').value = formatCurrency(t); calculateInvoiceChange(); }

  let activeCount = appData.users.filter(u => u.active && u.status === 'active').length;
  let totalSalaryBill = appData.users.filter(u => u.active && u.status === 'active').reduce((s,u) => s+(u.salary||0), 0);

  document.getElementById('contentArea').innerHTML = `
    <div class="grid-4">
      <div class="kpi-card"><div class="kpi-value">${appData.users.length}</div><div>Total Staff</div></div>
      <div class="kpi-card"><div class="kpi-value" style="color:#4caf50;">${activeCount}</div><div>Active</div></div>
      <div class="kpi-card"><div class="kpi-value" style="color:#00bcd4;">${pilots.length} / ${agris.length}</div><div>Pilots / Agri Officers</div></div>
      <div class="kpi-card"><div class="kpi-value" style="color:#ef5350;">${formatCurrency(totalSalaryBill)}</div><div>Monthly Salary Bill</div></div>
    </div>
    <div class="card">
      <h3 class="card-title">➕ Add New Employee</h3>
      <div class="grid-2">
        <div><label>Full Name *</label><input id="empName" placeholder="e.g. Ali Raza"></div>
        <div><label>Login Email *</label><input id="empEmail" type="email" placeholder="ali@example.com"></div>
        <div><label>Login Password *</label><input id="empPassword" type="text" placeholder="Min 6 characters"></div>
        <div><label>Role *</label><select id="empRole"><option value="pilot">✈️ Drone Pilot</option><option value="agri">🌾 Agri Officer</option><option value="manager">👑 Manager</option></select></div>
        <div><label>Monthly Salary (₨)</label><input type="number" id="empSalary" placeholder="0"></div>
        <div><label>Join Date</label><input type="date" id="empJoinDate" value="${today()}"></div>
        <div><label>Phone</label><input id="empPhone" placeholder="+92 300 0000000"></div>
        <div><label>CNIC / ID</label><input id="empCnic" placeholder="42201-0000000-0"></div>
      </div>
      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="addEmployee()"><i class="fas fa-user-plus"></i> Add Employee</button>
      </div>
    </div>
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:16px;">
        <h3 class="card-title" style="margin:0; border:none; padding:0;">👥 Team Directory</h3>
        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
          <input id="empSearch" placeholder="🔍 Search name or email..." oninput="filterEmployees()" style="width:220px; padding:8px 14px; border-radius:40px;">
          <select id="empRoleFilter" onchange="filterEmployees()" style="padding:8px 14px; border-radius:40px; width:160px;">
            <option value="">All Roles</option>
            <option value="manager">Manager</option>
            <option value="pilot">Drone Pilot</option>
            <option value="agri">Agri Officer</option>
          </select>
          <select id="empStatusFilter" onchange="filterEmployees()" style="padding:8px 14px; border-radius:40px; width:140px;">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="table-responsive">
        <table><thead><tr>
          <th>#</th><th>Name</th><th>Email</th><th>Role</th><th>Phone</th><th>Salary</th><th>Join Date</th><th>Status</th><th>Actions</th>
        </tr></thead><tbody id="employeesList"></tbody></table>
      </div>
    </div>
    <div class="card" style="display:flex; gap:12px; flex-wrap:wrap;">
      <button class="btn btn-success" onclick="processMonthlySalary()"><i class="fas fa-money-bill-wave"></i> Process Monthly Salary</button>
      <button class="btn btn-secondary" onclick="openChangePassword()"><i class="fas fa-key"></i> Change My Password</button>
    </div>`;
  filterEmployees();
}

function filterEmployees() {
  let search = (document.getElementById('empSearch')?.value || '').toLowerCase();
  let roleF = document.getElementById('empRoleFilter')?.value || '';
  let statusF = document.getElementById('empStatusFilter')?.value || '';
  let filtered = appData.users.filter(u => {
    let matchSearch = !search || u.name.toLowerCase().includes(search) || u.email.toLowerCase().includes(search) || (u.phone||'').includes(search);
    let matchRole = !roleF || u.role === roleF;
    let matchStatus = !statusF || u.status === statusF;
    return matchSearch && matchRole && matchStatus;
  });
  const roleLabel = { manager: '👑 Manager', pilot: '✈️ Pilot', agri: '🌾 Agri Officer' };
  document.getElementById('employeesList').innerHTML = filtered.length === 0
    ? '<tr><td colspan="9" style="text-align:center; padding:30px; color:rgba(255,255,255,0.4);">No employees found</td></tr>'
    : filtered.map((u, idx) => `<tr>
        <td style="color:rgba(255,255,255,0.4); font-size:11px;">${idx+1}</td>
        <td><strong>${u.name}</strong></td>
        <td style="font-size:12px; color:rgba(255,255,255,0.6);">${u.email}</td>
        <td><span class="badge" style="background:${u.role==='manager'?'rgba(255,183,77,0.2)':u.role==='pilot'?'rgba(0,188,212,0.2)':'rgba(76,175,80,0.2)'}; color:${u.role==='manager'?'#ffb74d':u.role==='pilot'?'#00bcd4':'#4caf50'};">${roleLabel[u.role]||u.role}</span></td>
        <td style="font-size:12px;">${u.phone||'-'}</td>
        <td style="color:#ffb74d; font-weight:600;">${formatCurrency(u.salary||0)}</td>
        <td style="font-size:12px;">${u.joinDate||'-'}</td>
        <td><span class="badge ${u.status==='active'?'badge-active':'badge-pending'}">${u.status}</span></td>
        <td style="display:flex; gap:6px; flex-wrap:wrap;">
          <button class="btn btn-sm btn-outline" onclick="viewEmployeePassword('${u.id}')" title="View Credentials"><i class="fas fa-key"></i></button>
          <button class="btn btn-sm btn-outline" onclick="editEmployeeSalary('${u.id}')" title="Edit Salary"><i class="fas fa-edit"></i></button>
          ${u.status==='active' ? `<button class="btn btn-sm btn-danger" onclick="updateEmployeeStatus('${u.id}','inactive')" title="Deactivate">Deactivate</button>` : `<button class="btn btn-sm btn-success" onclick="updateEmployeeStatus('${u.id}','active')" title="Activate">Activate</button>`}
          ${u.id !== 'u1' ? `<button class="btn btn-sm btn-danger" onclick="deleteEmployeeItem('${u.id}')" title="Delete"><i class="fas fa-trash"></i></button>` : ''}
        </td>
      </tr>`).join('');
}
function addEmployee() {
  let name = document.getElementById('empName').value.trim(),
      email = document.getElementById('empEmail').value.trim().toLowerCase(),
      password = document.getElementById('empPassword').value.trim(),
      role = document.getElementById('empRole').value,
      salary = parseFloat(document.getElementById('empSalary').value) || 0,
      phone = document.getElementById('empPhone').value.trim(),
      cnic = document.getElementById('empCnic').value.trim();
  if (!name) { toast('Employee name is required', 'error'); return; }
  if (!email || !email.includes('@')) { toast('Valid email address is required', 'error'); return; }
  if (!password || password.length < 4) { toast('Password must be at least 4 characters', 'error'); return; }
  if (appData.users.find(u => u.email.toLowerCase() === email)) { toast('This email is already registered', 'error'); return; }
  let newUser = {
    id: 'u_' + Date.now(),
    email, password, role, name,
    active: true,
    joinDate: document.getElementById('empJoinDate').value || today(),
    salary, phone, cnic,
    status: 'active'
  };
  appData.users.push(newUser);
  saveData();
  // Push user to Firebase immediately so they can login from any device
  if (window.firebaseReady && window.firebaseDB) {
    window.firebaseUpdate(window.firebaseRef(window.firebaseDB, `users/${newUser.id}`), newUser)
      .then(() => toast(`✅ ${name} added & synced — login: ${email}`))
      .catch(() => toast(`✅ ${name} added locally — sync pending`));
  } else {
    toast(`✅ ${name} added — login: ${email}`);
  }
  renderEmployees();
  ['empName','empEmail','empPassword','empSalary','empPhone','empCnic'].forEach(id => { let el = document.getElementById(id); if(el) el.value = ''; });
}

function editEmployeeSalary(uid) {
  let u = appData.users.find(u => u.id === uid);
  if (!u) return;
  let newSalary = prompt(`Edit monthly salary for ${u.name} (current: ₨ ${(u.salary||0).toLocaleString()}):`, u.salary || 0);
  if (newSalary === null) return;
  let parsed = parseFloat(newSalary);
  if (isNaN(parsed) || parsed < 0) { toast('Invalid salary amount', 'error'); return; }
  u.salary = parsed;
  saveData();
  renderEmployees();
  toast(`✅ Salary updated for ${u.name}: ${formatCurrency(parsed)}`);
}
function updateEmployeeStatus(uid, status) { let u = appData.users.find(u => u.id === uid); if (u) { u.status = status; u.active = (status === 'active'); saveData(); renderEmployees(); toast(`${u.name} status updated`); } }
function deleteEmployeeItem(uid) { if (confirm('Delete employee permanently?')) { appData.users = appData.users.filter(u => u.id !== uid); saveData(); renderEmployees(); toast('Employee deleted'); } }
function viewEmployeePassword(uid) {
  let u = appData.users.find(u => u.id === uid);
  if (!u) return;
  const roleLabel = { manager: '👑 Manager', pilot: '✈️ Drone Pilot', agri: '🌾 Agri Officer' };
  document.getElementById('passwordContent').innerHTML = `
    <div style="background:rgba(0,0,0,0.3); border-radius:16px; padding:20px; margin-bottom:16px;">
      <div style="font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:4px;">Employee</div>
      <div style="font-size:18px; font-weight:700;">${u.name}</div>
      <div style="margin-top:4px;"><span class="badge" style="background:rgba(255,183,77,0.2); color:#ffb74d;">${roleLabel[u.role]||u.role}</span> <span class="badge ${u.status==='active'?'badge-active':'badge-pending'}">${u.status}</span></div>
    </div>
    <div style="margin-bottom:12px;"><label>Login Email</label>
      <div style="display:flex; gap:8px;">
        <input type="text" value="${u.email}" readonly id="credEmail" style="flex:1;">
        <button class="btn btn-sm btn-outline" onclick="copyField('credEmail')"><i class="fas fa-copy"></i></button>
      </div>
    </div>
    <div style="margin-bottom:12px;"><label>Login Password</label>
      <div style="display:flex; gap:8px;">
        <input type="text" value="${u.password}" readonly id="credPwd" style="flex:1;">
        <button class="btn btn-sm btn-outline" onclick="copyField('credPwd')"><i class="fas fa-copy"></i></button>
      </div>
    </div>
    <div style="margin-bottom:16px;"><label>Login URL</label>
      <div style="display:flex; gap:8px;">
        <input type="text" value="${window.location.href}" readonly id="credUrl" style="flex:1; font-size:11px;">
        <button class="btn btn-sm btn-outline" onclick="copyField('credUrl')"><i class="fas fa-copy"></i></button>
      </div>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="copyAllCredentials('${u.id}')"><i class="fas fa-share"></i> Copy All Credentials</button>
      <button class="btn btn-outline" onclick="closeModal('viewPasswordModal')">Close</button>
    </div>`;
  document.getElementById('viewPasswordModal').classList.add('open');
}

function copyField(id) {
  let el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.value).then(() => toast('Copied!')).catch(() => { el.select(); document.execCommand('copy'); toast('Copied!'); });
}

function copyAllCredentials(uid) {
  let u = appData.users.find(u => u.id === uid);
  if (!u) return;
  let text = `AgriSpray Pro — Login Credentials\nName: ${u.name}\nRole: ${u.role}\nEmail: ${u.email}\nPassword: ${u.password}\nURL: ${window.location.href}`;
  navigator.clipboard.writeText(text).then(() => toast('✅ All credentials copied!')).catch(() => toast('Copy failed', 'error'));
}
function processMonthlySalary() {
  let activeEmployees = appData.users.filter(u => u.active && u.status === 'active');
  if (activeEmployees.length === 0) { toast('No active employees', 'error'); return; }
  let total = 0;
  activeEmployees.forEach(u => {
    let sal = u.salary || 0;
    if (sal > 0) {
      appData.expenses.push({
        id: Date.now() + Math.random(),
        date: today(),
        category: 'Salary',
        employeeId: u.id,
        employeeName: u.name,
        employeeRole: u.role,
        amount: sal,
        description: `Salary: ${u.name} (${u.role})`
      });
      total += sal;
    }
  });
  saveData(); renderExpenses(); renderDashboard();
  toast(`✅ Salary processed: ${formatCurrency(total)} for ${activeEmployees.length} employees`);
}
function renderSettings() { document.getElementById('contentArea').innerHTML = `<div class="card"><h3>Settings</h3><div><label>Company Name</label><input id="compName" value="${appData.companyName}"></div><div><label>WhatsApp Number</label><input id="waNum" value="${appData.whatsappNumber}"></div><button class="btn btn-primary" onclick="saveSettings()">Save Settings</button><button class="btn btn-secondary" onclick="openChangePassword()">Change My Password</button></div>`; }
function saveSettings() { appData.companyName = document.getElementById('compName').value; appData.whatsappNumber = document.getElementById('waNum').value; saveData(); toast('Settings saved'); }
function openChangePassword() { document.getElementById('changePwdContent').innerHTML = `<div><label>Current Password</label><input type="password" id="oldPwd"></div><div><label>New Password</label><input type="password" id="newPwd"></div><div><label>Confirm</label><input type="password" id="confirmPwd"></div><button class="btn btn-primary" onclick="changePassword()">Change</button>`; document.getElementById('changePasswordModal').classList.add('open'); }
function changePassword() { let old = document.getElementById('oldPwd').value, newP = document.getElementById('newPwd').value, con = document.getElementById('confirmPwd').value; if (old !== currentUser.password) { toast('Current password incorrect', 'error'); return; } if (newP !== con) { toast('Passwords do not match', 'error'); return; } currentUser.password = newP; let idx = appData.users.findIndex(u => u.id === currentUser.id); if (idx !== -1) appData.users[idx].password = newP; saveData(); closeModal('changePasswordModal'); toast('Password changed successfully!'); }

function showPage(page) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  let titles = { dashboard: '📊 Dashboard', bookings: '📋 Bookings', invoices: '💰 Invoices', expenses: '📉 Expenses', investments: '📈 Investments', drones: '🚁 Drones', employees: '👥 Employees', settings: '⚙️ Settings' };
  document.getElementById('pageTitle').innerHTML = titles[page] || page;
  if (page === 'dashboard') renderDashboard();
  else if (page === 'bookings') renderBookings();
  else if (page === 'invoices') renderInvoices();
  else if (page === 'expenses') renderExpenses();
  else if (page === 'investments') renderInvestments();
  else if (page === 'drones') renderDrones();
  else if (page === 'employees') renderEmployees();
  else if (page === 'settings') renderSettings();
}

loadData();
if (!checkSession()) { document.getElementById('loginScreen').style.display = 'flex'; document.getElementById('mainApp').style.display = 'none'; }
</script>
</body>
</html>
